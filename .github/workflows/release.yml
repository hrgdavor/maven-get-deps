name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up GraalVM
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '21'
          distribution: 'graalvm'
          github-token: ${{ secrets.GITHUB_TOKEN }}
          native-image-job-reports: 'true'

      - name: Build with Maven
        run: mvn clean package -Pnative -DskipTests

      - name: Prepare Artifacts
        shell: bash
        run: |
          mkdir -p release-artifacts
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            7z a release-artifacts/maven-get-deps-windows-x64.zip ./target/maven-get-deps.exe
          else
            tar -czf release-artifacts/maven-get-deps-linux-x64.tar.gz -C target maven-get-deps
            cp target/maven-get-deps-*-cli.jar release-artifacts/maven-get-deps-cli.jar
          fi

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-${{ matrix.os }}
          path: release-artifacts/*

  build-zig:
    name: Build Zig tool (cross-compile all targets)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Zig
        uses: mlugg/setup-zig@v2
        with:
          version: '0.15.2'

      - name: Build Zig (Windows x64)
        run: zig build -Doptimize=ReleaseSafe -Dtarget=x86_64-windows

      - name: Package Zig Windows x64
        run: |
          mkdir -p release-artifacts
          cd zig-out/bin
          zip ../../release-artifacts/maven-get-deps-zig-windows-x64.zip maven_get_deps.exe

      - name: Build Zig (Linux x64)
        run: zig build -Doptimize=ReleaseSafe -Dtarget=x86_64-linux

      - name: Package Zig Linux x64
        run: |
          tar -czf release-artifacts/maven-get-deps-zig-linux-x64.tar.gz -C zig-out/bin maven_get_deps

      - name: Build Zig (Linux ARM64)
        run: zig build -Doptimize=ReleaseSafe -Dtarget=aarch64-linux

      - name: Package Zig Linux ARM64
        run: |
          tar -czf release-artifacts/maven-get-deps-zig-linux-arm64.tar.gz -C zig-out/bin maven_get_deps

      - name: Upload Zig Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-zig
          path: release-artifacts/*

  release:
    name: Create Release
    needs: [build, build-zig]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            release-artifacts/*.jar
            release-artifacts/*.tar.gz
            release-artifacts/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
