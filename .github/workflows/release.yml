name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up GraalVM
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '21'
          distribution: 'graalvm'
          github-token: ${{ secrets.GITHUB_TOKEN }}
          native-image-job-reports: 'true'

      - name: Build with Maven
        run: |
          mvn install -f cve-common/pom.xml
          mvn package -f cve12/pom.xml -DskipTests
          mvn clean package -Pexecutable -Pnative -DskipTests

      - name: Prepare Artifacts
        shell: bash
        run: |
          mkdir -p release-artifacts
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            7z a release-artifacts/maven-get-deps-windows-x64.zip ./target/maven-get-deps.exe
            7z a release-artifacts/cve12-windows-x64.zip ./cve12/target/cve12.exe
          elif [ "${{ matrix.os }}" = "macos-latest" ]; then
            tar -czf release-artifacts/maven-get-deps-macos-x64.tar.gz -C target maven-get-deps
            tar -czf release-artifacts/cve12-macos-x64.tar.gz -C cve12/target cve12
          else
            tar -czf release-artifacts/maven-get-deps-linux-x64.tar.gz -C target maven-get-deps
            tar -czf release-artifacts/cve12-linux-x64.tar.gz -C cve12/target cve12
            cp maven-get-deps-cli/target/maven-get-deps-*-cli.jar release-artifacts/maven-get-deps-cli.jar
          fi
          cp cve12/target/cve12-*-cli.jar release-artifacts/cve12-cli.jar

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-${{ matrix.os }}
          path: release-artifacts/*

  build-zig:
    name: Build Zig tool (cross-compile all targets)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Zig
        uses: mlugg/setup-zig@v2
        with:
          version: '0.15.2'

      - name: Create release-artifacts directory
        run: mkdir -p release-artifacts

      - name: Build Zig (Windows x64)
        run: |
          zig build -Doptimize=ReleaseSafe -Dtarget=x86_64-windows
          zip -j release-artifacts/get-deps-zig-windows-x64.zip zig-out/bin/get_deps.exe
          zip -j release-artifacts/version-manager-zig-windows-x64.zip zig-out/bin/version_manager.exe
          zip -j release-artifacts/gen-index-zig-windows-x64.zip zig-out/bin/gen_index.exe

      - name: Build Zig (Linux x64)
        run: |
          zig build -Doptimize=ReleaseSafe -Dtarget=x86_64-linux
          tar -czf release-artifacts/get-deps-zig-linux-x64.tar.gz -C zig-out/bin get_deps
          tar -czf release-artifacts/version-manager-zig-linux-x64.tar.gz -C zig-out/bin version_manager
          tar -czf release-artifacts/gen-index-zig-linux-x64.tar.gz -C zig-out/bin gen_index

      - name: Build Zig (Linux ARM64)
        run: |
          zig build -Doptimize=ReleaseSafe -Dtarget=aarch64-linux
          tar -czf release-artifacts/get-deps-zig-linux-arm64.tar.gz -C zig-out/bin get_deps
          tar -czf release-artifacts/version-manager-zig-linux-arm64.tar.gz -C zig-out/bin version_manager
          tar -czf release-artifacts/gen-index-zig-linux-arm64.tar.gz -C zig-out/bin gen_index

      - name: Build Zig (macOS x64)
        run: |
          zig build -Doptimize=ReleaseSafe -Dtarget=x86_64-macos
          tar -czf release-artifacts/get-deps-zig-macos-x64.tar.gz -C zig-out/bin get_deps
          tar -czf release-artifacts/version-manager-zig-macos-x64.tar.gz -C zig-out/bin version_manager
          tar -czf release-artifacts/gen-index-zig-macos-x64.tar.gz -C zig-out/bin gen_index

      - name: Build Zig (macOS ARM64)
        run: |
          zig build -Doptimize=ReleaseSafe -Dtarget=aarch64-macos
          tar -czf release-artifacts/get-deps-zig-macos-arm64.tar.gz -C zig-out/bin get_deps
          tar -czf release-artifacts/version-manager-zig-macos-arm64.tar.gz -C zig-out/bin version_manager
          tar -czf release-artifacts/gen-index-zig-macos-arm64.tar.gz -C zig-out/bin gen_index

      - name: Upload Zig Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-zig
          path: release-artifacts/*

  release:
    name: Create Release
    needs: [build, build-zig]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            release-artifacts/*.jar
            release-artifacts/*.tar.gz
            release-artifacts/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
