" + $CP\r\njava com.example.Main\r\n```\r\n\r\n---\r\n\r\n## Multiple App Versions & Cleanup\r\n\r\nIf multiple versions of your application are deployed simultaneously (e.g., blue-green or canary deployments), the shared library accumulates dependencies from all versions. Each version's `dependencies.txt` acts as a manifest of which JARs it needs.\r\n\r\nWhen you retire an old version, its `dependencies.txt` can be used to identify and remove JARs that are no longer needed by any current version:\r\n\r\n```bash\r\n# (Future: diff dependencies between versions to find obsolete JARs)\r\n```\r\n\r\n---\r\n\r\n## Container Deployments\r\n\r\nFor Docker and Kubernetes deployments, see these guides:\r\n\r\n- **[Dynamic Cache (Docker)](README.docker.md)** ŌĆö Use the Zig tool inside Docker to fill a shared Maven cache at container startup.\r\n- **[Static Classpath (Docker & K8s)](README.static-docker.md)** ŌĆö Bake a fixed classpath into your Docker image at build time for the leanest, most secure runtime.\r\n- **[Systemd Deployment Guide](README.systemd.md)** ŌĆö Step-by-step example of deploying a multi-module Java daemon.\r\n"},"README.usage-report":{"title":"Dependency Size Reporting","content":"# Dependency Size Reporting\r\n\r\nThe `maven-get-deps` tool can generate a Markdown report that attributes disk size to your direct dependencies. \r\n\r\n## Incremental Size Attribution\r\n\r\nUnlike a simple `mvn dependency:list`, which just shows you what is there, this report helps you understand **why** your deployment is large.\r\n\r\nIt attributes size **incrementally**:\r\n1. Each top-level dependency is charged for its own JAR.\r\n2. It is then charged for all its unique transitive dependencies (those not already accounted for by a previous top-level dependency).\r\n3. This process continues through the list, ensuring every byte is counted exactly once.\r\n\r\nThis approach pinpoints which specific direct dependencies are responsible for the most \"weight\" in your final artifact.\r\n\r\n## Example Report\r\n\r\nThis example was generated using the `pom.xml` of the `maven-get-deps` project itself.\r\n\r\n```bash\r\njava -jar maven-get-deps-cli.jar --pom pom.xml --report report.md\r\n```\r\n\r\n### report.md\r\n\r\n| Size (KB) | Dependency                                                      |\r\n|----------:|:----------------------------------------------------------------|\r\n|       156 | org.apache.maven.resolver:maven-resolver-api:1.9.18             |\r\n|        53 | org.apache.maven.resolver:maven-resolver-spi:1.9.18             |\r\n|       194 | org.apache.maven.resolver:maven-resolver-util:1.9.18            |\r\n|       314 | org.apache.maven.resolver:maven-resolver-impl:1.9.18            |\r\n|        43 | org.apache.maven.resolver:maven-resolver-connector-basic:1.9.18 |\r\n|        60 | org.apache.maven.resolver:maven-resolver-transport-http:1.9.18  |\r\n|        24 | org.apache.maven.resolver:maven-resolver-supplier:1.9.18        |\r\n|        77 | org.apache.maven:maven-resolver-provider:3.9.6                  |\r\n|       215 | org.apache.maven:maven-model:3.9.6                              |\r\n|        58 | org.slf4j:slf4j-simple:1.7.36                                   |\r\n> Total size: 1225143 bytes (1.17 MB)\r\n\r\n## Using the Report in CI/CD\r\n\r\nYou can use this report to monitor dependency bloat over time. For example, in a GitHub Action:\r\n\r\n```yaml\r\n- name: Generate Size Report\r\n  run: java -jar maven-get-deps-cli.jar --report size-report.md\r\n\r\n- name: Comment on PR\r\n  uses: peter-evans/create-or-update-comment@v4\r\n  with:\r\n    issue-number: ${{ github.event.pull_request.number }}\r\n    body-path: size-report.md\r\n```\r\n"},"README.version_manager":{"title":"version_manager: Zero-Downtime Deployment","content":"# version_manager: Zero-Downtime Deployment\n\nThe `version_manager` tool handles application versioning, atomic symlink swaps, and deployment history tracking.\n\n## Manifest Format (`manifest.json`)\nThe manifest is the source of truth for an application's deployment state.\n\n```json\n{\n  \"current_version\": \"1.2.4\",\n  \"version_index\": [\"versions.json\", \"archive.json\"],\n  \"symlink\": \"current\",\n  \"trigger_cmd\": \"systemctl restart my-app\",\n  \"history\": [\n    {\n      \"version\": \"1.2.3\",\n      \"timestamp\": 1710123456,\n      \"comment\": \"Previous stable release\",\n      \"failed\": false,\n      \"deployed_at\": 1710123000,\n      \"removed_at\": 1710123456\n    }\n  ],\n  \"current_deployed_at\": 1710123456\n}\n```\n\n- `current_version`: The ID of the version that *should* be active.\n- `version_index`: Array of paths to index files (or a single string for backward compatibility with load).\n- `symlink`: (Optional) The path to the symlink that points to the current version. Default is \"current\". Can be absolute or relative to the manifest.\n- `trigger_cmd`: (Optional) Shell command executed only when a version swap actually occurs.\n- `history`: (Automatic) Log of previous deployment actions.\n- `current_deployed_at`: (Automatic) Timestamp when the current version was deployed.\n\n---\n\n## Commands\n\n### 1. init\nInitializes a new manifest file.\n```sh\n./version_manager app-manifest.json init [indices] [symlink]\n```\n-   `[indices]`: (Optional) Comma-separated list of index files. Defaults to `versions.json`.\n-   `[symlink]`: (Optional) The symlink path. Defaults to `current`.\n\n### 2. deploy\nDeploys a new version by updating the manifest and preparing for a symlink swap.\n```sh\n./version_manager app-manifest.json deploy <version> [--force]\n```\n-   `<version>`: The version ID to deploy. Must exist in the version index.\n-   `--force`: (Optional) Deploy even if the version is marked as failed in history.\n\n### 3. reconcile\nEnsures the `current` symlink matches the version specified in the manifest.\n```sh\n./version_manager app-manifest.json reconcile\n```\n\n#### Atomic Symlink Swaps\nWhen `reconcile` (or `deploy`) detects a version mismatch, it atomically replaces the `current` symlink using a temporary link and the `rename` syscall.\n\n### 4. current-name\nOutputs the currently active version name (raw string for scripting).\n```sh\n./version_manager app-manifest.json current-name\n```\n\n### 5. current-path\nOutputs the resolved filesystem path for the currently active version (raw string for scripting).\n```sh\n./version_manager app-manifest.json current-path\n```\n\n### 6. upgrade-failed\nReverts to the previous stable version if a new deployment is found to be unstable.\n```sh\n./version_manager app-manifest.json upgrade-failed\n```\nPromotes the most recent successful version from history and marks the current one as `\"failed\": true`.\n\n### 5. list\nLists available versions from the index and provides details on the current version and recent history.\n```sh\n./version_manager app-manifest.json list\n```\nDisplays index entries, current deployment time, and the last 3 history entries with timestamps and status.\n"},"README.zig":{"title":"maven-get-deps (Zig Edition)","content":"# maven-get-deps (Zig Edition)\n\nThe Zig version of `maven-get-deps` consists of three ultra-fast, zero-dependency companion tools designed for high-performance deployment environments and CI/CD pipelines.\n\n## Tools Overview\n\n### 1. get_deps\nFocused on dependency resolution, classpath generation, and artifact downloading.\n- [Usage & Examples](README.get_deps.md) (Zig version) / [Java version](README.maven_get_deps.md)\n\n### 2. version_manager\nFocused on zero-downtime application updates via atomic symlink swaps and version tracking.\n- [Usage & Deployment Guide](README.version_manager.md)\n\n### 3. gen_index\nFocused on automating the discovery of application versions and generating an index for the version manager.\n- [Index Generation Guide](README.gen_index.md)\n\n## Why use the Zig tools?\n\n1.  **Speed**: Execution time is often **5x-10x faster** than the Java version.\n2.  **Zero Dependencies**: Single standalone binaries. No JVM required.\n3.  **Efficiency**: Extremely low memory footprint.\n4.  **Zero-Downtime**: Atomic symlink swaps prevent partially seen deployments. (for version _namager)\n\n## Production Integration\n- [See the Docker & Kubernetes Integration Guide](README.docker.md)\n- [Java & Systemd Production Example](README.deps.md#production-example-java--systemd)\n\n## Building from source\n\nEnsure you have [Zig 0.15.2](https://ziglang.org/download/) installed.\n\n```bash\nzig build -Doptimize=ReleaseSafe\n```\nThe binaries (`get_deps`, `version_manager`, and `gen_index`) will be located in `zig-out/bin/`.\n"}},"adventures":{"chrono-shifter":{"title":"­¤īĆ The Chrono-Shifter's Leap - Masters of the Symlink Swap","content":"# ­¤īĆ Adventure: The Chrono-Shifter's Leap - Masters of the Symlink Swap\n\nWelcome, Traveler! Your domain is time and its flawless transitions. You have bound sentinels to the realm; now, you must master the trial of the **Gatekeeper**.\n\n> [!IMPORTANT]\n> **Requirements**: ­¤ÆÄ Crystalline Sentinel, [Tome of Temporal Shifting](./primers/chrono.md).\n\n> [!NOTE]\n> This adventure is a narrative companion to the **[Deployment Guide](../doc/README.usage-deploy.md)**.\n\n## ­¤ÆÄ Rewards Summary\n- **Seal of Mastery**: ­¤īĆ Seal of the Gatekeeper.\n- **Weapons Gained**: ­¤ŚĪ’ĖÅ Chrono-Key (Sword).\n- **Primary Loot**: `version_manager`, Atomic Swap protocols.\n- **Secondary Loot**: `gen_index`, \"Developer's Blink\" (Rsync) shortcuts.\n- **Experience**: +2500 Temporal Logistics.\n\n\n\n---\n\n## ­¤ōģ Stage 1: The Timeline Structure\n*Goal: Organize your vault into temporal layers.*\n\nWe don't overwrite the old with the new. We keep each version in its own sanctuary.\n\n**Your Task**: Create a versioned directory structure for your application.\n```bash\nsudo mkdir -p /opt/nexus-app/versions\nsudo mkdir -p /opt/nexus-app/versions/v1.0.0\nsudo mkdir -p /opt/nexus-app/versions/v1.1.0\n```\n*By keeping versions separate, you can always retreat to the past if the future is broken.*\n\n---\n\n## ŌÜĪ Stage 2: The Atomic Swap (version_manager)\n*Goal: Move between versions instantly.*\n\nUsing a symbolic link (`symlink`) allows your Systemd Sentinel to always point to `/opt/app/current`, while `current` itself changes destination. We first need a **Manifest** to track our timeline.\n\n**Your Task**: Initialize the tracker and perform an atomic switch to `v1.1.0`.\n```bash\n# 1. Prepare a list of folders to scan for versions\necho \"/opt/nexus-app/versions\" > folders.txt\n\n# 2. Generate the version index\ngen_index --folders folders.txt --output versions.json\n\n# 3. Initialize the Version Manager manifest\nversion_manager manifest.json init versions.json current\n\n# 4. Deploy the new version\nversion_manager manifest.json deploy v1.1.0\n```\n*Observe with `ls -l /opt/nexus-app`. You will see `current` now points to `v1.1.0`. The change happened so fast that the application didn't even notice the ground shifted beneath it.*\n\n---\n\n## ­¤ō” Stage 3: The CI Pipeline (Automated Tribute)\n*Goal: Feed the vault from the heavens.*\n\nIn a productive empire, your CI (like GitHub Actions) should automatically populate the `versions` folder.\n\n**Your Task**: Mock a CI deployment by rsyncing a build to the vault and updating the index.\n```bash\n# Simulating CI output to a versioned folder\nrsync -avz ./dist/ user@server:/opt/nexus-app/versions/ci-build-${GITHUB_SHA}/\n\n# Tell the server to re-scan for the new version\nssh user@server \"gen_index --folders folders.txt && version_manager manifest.json deploy ci-build-${GITHUB_SHA}\"\n```\n*Your CI should always push to a unique folder, then trigger the manager to swap the link.*\n\n---\n\n## ­¤ÜĆ Stage 4: The Developer's Blink (Rapid Rsync)\n*Goal: Transport your prototype to the server instantly.*\n\nSometimes, you need to test a small change without the full CI ritual. We use **Rsync** to only transport the differences.\n\n**Your Task**: Synchronize your local dev folder to a special `dev` version slot.\n```bash\n# Rapidly transport only the changed bytes\nrsync -avz --delete --exclude 'target' ./ user@server:/opt/nexus-app/versions/dev/\n\n# Swap the Nexus to point to the dev version\nssh user@server \"gen_index --folders folders.txt && version_manager manifest.json deploy dev --force\"\n```\n*This is the \"Developer's Blink\". You can see your local changes live on the server in seconds.*\n\n---\n\n## ­¤Åå Final Ritual: Master of the Chronic Shift\n*Goal: Rollback to the safe harbor.*\n\nThe ultimate test of a Chrono-Shifter is the **Rollback**.\n\n**Your Task**: Disaster has struck `dev`! Leap back to `v1.1.0` instantly.\n```bash\nversion_manager manifest.json deploy v1.1.0\n```\n*The Sentinel is once again secure. You have saved the realm.*\n\n---\n\n## ­¤Äō Graduation\nYou have completed the Trilogy!\n\n**Next Step**: Visit the **[Telekinetic Nexus](./README.md)** to explore other paths or the **[Tome of Knowledge](../README.md)** to start your own empire.\n\n\n","rewards":["Seal of the Gatekeeper","’ĖÅ Chrono-Key"]},"java-forge":{"title":"­¤ö© The Java Forge - Crafting Arcane JARs","content":"# ­¤ö© Adventure: The Java Forge - Crafting Arcane JARs\n\nWelcome, Traveler! Your path continues. To build a lasting empire, you must first master the art of forging efficient artifacts. For this trial, you shall take up the **Architect's Mantle**.\n\n> [!IMPORTANT]\n> **Requirements**: [Scroll of Arcane Forging](./primers/forge.md).\n\n> [!NOTE]\n> This adventure is a narrative companion to the **[CLI Guide](../doc/README.cli.md)** and **[Maven Plugin Guide](../doc/maven/README.maven-plugin.md)**.\n\n## ­¤ÆÄ Rewards Summary\n- **Seal of Mastery**: ­¤Åø’ĖÅ Seal of the Architect.\n- **Tools Gained**: ­¤øĀ’ĖÅ Architect's Hammer.\n- **Primary Loot**: `maven-get-deps` (CLI & Maven Plugin).\n- **Secondary Loot**: Thin JAR extraction rituals, Zig Dispatcher speed.\n- **Experience**: +1000 Maven Mastery.\n\n\n---\n\n## ­¤Åø’ĖÅ Stage 1: The Gathering of Modules\n*Goal: Understand the lineage of a multi-module empire.*\n\nExplore the `examples/multi` directory. You will find:\n-   **`pom.xml`**: The Great Charter (Parent POM) that defines the modules.\n-   **`odt-lib`**: A library for manipulating the ODT format.\n-   **`md-to-odt`**: A tool that uses the library to transform Markdown.\n\n**Your Task**: Go to the root of the example and build all modules.\n```bash\ncd examples/multi\nmvn clean install\n```\n*Wait for the forge to cool. You have now populated your local treasury with these artifacts.*\n\n---\n\n## ŌÜŚ’ĖÅ Stage 2: The Alchemist's Extraction\n*Goal: Create a Thin JAR and externalize its weight.*\n\nThe `md-to-odt` tool is powerful, but it relies on external libraries. Instead of creating a heavy \"Fat JAR,\" we will distill it into a **Manifest** of its dependencies.\n\n**Your Task**: Use `maven-get-deps` to resolve dependencies and generate a manifest.\n```bash\n# Generate a manifest of dependencies for the md-to-odt tool\njava -jar ../../target/maven-get-deps-cli.jar md-to-odt/pom.xml --dest-dir dist/lib --output manifest.txt\n```\n*Observe `manifest.txt`. It contains the lineage (G:A:V) required for the tool to function.*\n\n---\n\n## ŌÜĪ Stage 3: The Native Spirits\n*Goal: Harness the speed of the Zig Resolver.*\n\nWhen you have a manifest, you can use the **Zig** utility to fetch the artifacts with lightning speed.\n\n**Your Task**: Use `get-deps` to consume the manifest and download missing artifacts.\n```bash\n# Consume the manifest and ensure all artifacts are in your local vault\nget-deps deps --input manifest.txt --download\n```\n*Note the difference in speed. The Zig resolver is a lightweight scout that performs the same task in a fraction of the time.*\n\n---\n\n## ­¤øĪ’ĖÅ Stage 4: Warding the Perimeter\n*Goal: Scan your artifacts for hidden curses.*\n\nBefore you deploy your loot, you must ensure it is not carrying any CVE curses. The sentinel `cve12` also consumes the manifest.\n\n**Your Task**: Run the sentinel `cve12` on the dependency manifest.\n```bash\n# Run cve12 to check for vulnerabilities\njava -jar ../../cve12/target/cve12-cli.jar --input manifest.txt --report cve-report.md\n```\n*Observe `cve-report.md`. If it reveals dark vulnerabilities, you must cleanse them (update versions) before proceeding.*\n\n---\n\n**Next Step**: Return to the **[Telekinetic Nexus](./README.md)** or proceed to **[The Sentinel's Ritual](./sentinel-ritual.md)**.\n\n\n","rewards":["Seal of the Architect","’ĖÅ Architect's Hammer"]},"sentinel-ritual":{"title":"­¤Ģ»’ĖÅ The Sentinel's Ritual - Conjuring the Systemd Spirits","content":"# ­¤Ģ»’ĖÅ Adventure: The Sentinel's Ritual - Conjuring the Systemd Spirits\n\nWelcome, Traveler! Your duty is to guard the stability and security of the realm. You have learned how artifacts are forged; now, you must seek the wisdom of the **Warden**.\n\n> [!IMPORTANT]\n> **Requirements**: ­¤øĀ’ĖÅ Architect's Hammer, [Scroll of Systemd Binding](./primers/systemd.md).\n\n> [!NOTE]\n> This adventure is a narrative companion to the **[Systemd Guide](../doc/README.systemd.md)**.\n\n## ­¤ÆÄ Rewards Summary\n- **Seal of Mastery**: ­¤øĪ’ĖÅ Seal of the Warden.\n- **Loot Gained**: ­¤ÆÄ Crystalline Sentinel (Gem).\n- **Primary Loot**: Systemd Unit File patterns, User Isolation rituals.\n- **Secondary Loot**: ACL Permission Warding, Sentinel monitoring.\n- **Experience**: +1500 Security Alchemy.\n\n\n\n---\n\n## ­¤æź Stage 1: The Circle of Isolation\n*Goal: Create a dedicated spirit (User) to inhabit the app.*\n\nRunning an application as a \"Root Overlord\" is a dangerous path that leads to corruption. We must create a restricted user.\n\n**Your Task**: Create a system user named `sentinel-app` and a group for shared access.\n```bash\nsudo useradd -r -s /bin/false sentinel-app\nsudo groupadd devs\nsudo usermod -aG devs sentinel-app\n```\n*You have created a vessel that can hold power without endangering the entire kingdom.*\n\n---\n\n## ­¤Å╣ Stage 2: Binding the Sentinel (Systemd)\n*Goal: Create a ritual (Unit File) to keeping the app alive.*\n\nThe Sentinel needs instructions on how to behave.\n\n**Your Task**: Create a service file `/etc/systemd/system/sentinel-app.service`.\n```ini\n[Unit]\nDescription=The Sentinel Application\nAfter=network.target\n\n[Service]\nUser=sentinel-app\nGroup=devs\nWorkingDirectory=/opt/nexus-app\nExecStart=/usr/bin/java -jar /opt/nexus-app/current/nexus-app.jar\nRestart=always\n\n[Install]\nWantedBy=multi-user.target\n```\n*Note the `User` and `Group` fields. They ensure the Sentinel acts within its boundaries.*\n\n---\n\n## ­¤øĪ’ĖÅ Stage 3: The Warding of Paths (ACLs)\n*Goal: Grant permissions without weakening the gates.*\n\nSometimes, your app needs to read resources owned by others. Instead of opening the gates to everyone (`chmod 777`), we use **Access Control Lists (ACLs)**.\n\n**Your Task**: Grant the `sentinel-app` read access to a specific shared log folder.\n```bash\n# Ensure ACL tools are installed\nsudo apt-get install acl\n\n# Grant access just to our sentinel user\nsudo setfacl -m u:sentinel-app:rx /var/log/shared-resources\n```\n*Verify with `getfacl /var/log/shared-resources`. You will see the individual user has been granted entry.*\n\n---\n\n## ­¤¦¬ Stage 4: Igniting the Flame\n*Goal: Activate the ritual.*\n\n**Your Task**: Tell the kernel to recognize your new service and start it.\n```bash\nsudo systemctl daemon-reload\nsudo systemctl start sentinel-app\nsudo systemctl enable sentinel-app\n```\n*Check the status: `sudo systemctl status sentinel-app`. If it is \"Active\", your Sentinel is now on duty!*\n\n---\n\n**Next Step**: Return to the **[Telekinetic Nexus](./README.md)** or proceed to **[The Chrono-Shifter's Leap](./chrono-shifter.md)**.\n\n\n","rewards":["Seal of the Warden","Crystalline Sentinel"]}}}</script>
