    <script id="nexus-data" type="application/json">{"docs":{"DEPENDENCY_RESOLUTION":{"title":"Maven Dependency Resolution Internals","content":"# Maven Dependency Resolution Internals\n\nThis document provides a technical overview of how Maven (and its `mimic` implementations) resolves transitive dependencies, handles version conflicts, and applies management rules.\n\n## 1. Conflict Resolution: \"Nearest Wins\"\n\nMaven uses a **Breadth-First Search (BFS)** strategy to build the dependency tree. This leads to the \"Nearest Wins\" rule:\n\n*   **Mechanism**: The version of a dependency that is at the shallowest depth in the tree is chosen.\n*   **Tie-breaking**: If two versions are at the same depth, the one declared first in the `pom.xml` (or encountered first in the BFS queue) wins.\n*   **Implication**: You can override any transitive dependency version by declaring it as a direct dependency in your project's `pom.xml`.\n\n## 2. Precedence Hierarchy\n\nWhen resolving a version for a given `groupId:artifactId`, Maven checks sources in the following order:\n\n1.  **Direct Declaration**: Explicit version in the `<dependencies>` section of the project.\n2.  **Root Project Management**: Versions defined in the project's `<dependencyManagement>` section take absolute precedence over all transitive versions.\n3.  **Inherited Management**: Versions from parent POMs' `<dependencyManagement>`.\n4.  **Imported BOMs**: Versions from POMs imported via `<scope>import</scope>` in `<dependencyManagement>`.\n5.  **Transitive Mediation**: The \"Nearest Wins\" rule applied to the remaining graph.\n\n## 3. Dependency Management & Import Scope\n\nThe `<dependencyManagement>` section acts as a version catalog.\n\n### Import Scope (BOMs)\n*   **Usage**: Used with `type=\"pom\"` and `scope=\"import\"`.\n*   **Effect**: Incorporates the `<dependencyManagement>` of the target POM into the current POM's management section.\n*   **Mimic Implementation**: The `MimicDependencyResolver` must download the BOM, parse its `dependencyManagement` section, and merge it into the current `PomContext`.\n\n## 4. Exclusions\n\nExclusions are **recursive** and **propagated**.\n\n*   **Logic**: If `A` depends on `B` and excludes `C`, then no transitive dependencies of `B` can pull in `C`.\n*   **Implementation**: A \"blacklist\" (Set of `groupId:artifactId`) must be passed down each branch of the BFS traversal.\n\n## 5. Implementation Differences (Java vs. Zig)\n\n| Feature | Java Mimic | Zig Mimic (Target) |\n| :--- | :--- | :--- |\n| **Search Algorithm** | BFS (Queue) | BFS (Queue) |\n| **Exclusions** | Recursive Set | **[TODO]** Implement recursive propagation |\n| **Import Scope** | Recursive BOM loading | **[TODO]** Implement BOM merging |\n| **Profiles** | Ignored | Ignored (by target) |\n| **Properties** | System > Env > Project | **[TODO]** Align hierarchy |\n| **Version Ranges** | Literal match | Literal match (remove heuristic) |\n\n## 6. Practical Parity Goals\n\nTo achieve 100% parity with the Java `mimic` version:\n\n1.  **Exclusions**: Every `Node` in the resolution queue must carry a copy of its parent's exclusions plus any new ones declared on the dependency itself.\n2.  **BOMs**: `PomContext` must be updated to handle `import` scope by transitively loading managed versions.\n3.  **Precedence**: Ensure the `root_ctx` management is checked before any transitive management.\n"},"gradle.plugin":{"title":"Gradle Plugin for maven-get-deps","content":"# Gradle Plugin for maven-get-deps\r\n\r\nTo keep `maven-get-deps` clean and avoid polluting the underlying project with Gradle wrappers and dependencies, you can create a lightweight, standalone Gradle plugin or task in a separate project.\r\n\r\nThis guide explains how to build a minimal Gradle equivalent that achieves the core features of `maven-get-deps` for a Gradle environment:\r\n1. Resolving project dependencies and exporting them to a file (like `deps.txt`).\r\n2. Supporting an `--extra-classpath` option to append custom entries directly into the generated file.\r\n\r\n---\r\n\r\n## 1. Quick Ad-Hoc Script (`build.gradle.kts`)\r\n\r\nIf you want to quickly generate the dependencies list without building a full standalone plugin, you can register a custom `getDeps` task directly in your Gradle build scripts.\r\n\r\n```kotlin\r\n// build.gradle.kts\r\ntasks.register(\"getDeps\") {\r\n    group = \"build\"\r\n    description = \"Exports runtime dependencies to a file, mimicking maven-get-deps.\"\r\n    \r\n    // Optional parameters: read extra classpath file and exclusion filters via properties\r\n    val extraClasspathFile = project.findProperty(\"extraClasspath\") as String?\r\n    val excludeClasspathFilter = project.findProperty(\"excludeClasspath\") as String?\r\n    \r\n    doLast {\r\n        val destFile = layout.buildDirectory.file(\"deps.txt\").get().asFile\r\n        // Resolve the runtime classpath for the main source set\r\n        val runtimeClasspath = configurations.getByName(\"runtimeClasspath\")\r\n        \r\n        val deps = mutableListOf<String>()\r\n        val excludeFilters = excludeClasspathFilter?.split(\",\")?.map { it.trim() } ?: emptyList()\r\n\r\n        // Helper function to check if an item should be excluded\r\n        fun shouldExclude(item: String, artifactId: String? = null): Boolean {\r\n            return excludeFilters.any { filter ->\r\n                item.contains(filter) || (artifactId != null && artifactId.contains(filter))\r\n            }\r\n        }\r\n        \r\n        // 1. Add resolved dependencies as absolute paths\r\n        runtimeClasspath.resolvedConfiguration.resolvedArtifacts.forEach { artifact ->\r\n            val artifactPath = artifact.file.absolutePath\r\n            val artifactId = \"${artifact.moduleVersion.group}:${artifact.moduleVersion.name}\"\r\n            \r\n            if (!shouldExclude(artifactPath, artifactId)) {\r\n                deps.add(artifactPath)\r\n            }\r\n        }\r\n        \r\n        // 2. Add extra classpath entries if the parameter was provided\r\n        if (extraClasspathFile != null) {\r\n            val extraFile = file(extraClasspathFile)\r\n            if (extraFile.exists()) {\r\n                extraFile.readLines().forEach { line ->\r\n                    if (line.isNotBlank()) {\r\n                        if (!shouldExclude(line.trim())) {\r\n                            deps.add(line.trim())\r\n                        }\r\n                    }\r\n                }\r\n            } else {\r\n                logger.warn(\"Extra classpath file not found: $extraClasspathFile\")\r\n            }\r\n        }\r\n        \r\n        // 3. Write output to deps.txt\r\n        destFile.parentFile.mkdirs()\r\n        destFile.writeText(deps.joinToString(\"\\n\"))\r\n        println(\"Generated dependencies list at: ${destFile.absolutePath}\")\r\n    }\r\n}\r\n```\r\n\r\n### Usage Examples\r\n\r\nGenerate `deps.txt` using the resolved dependencies from your project:\r\n```bash\r\n./gradlew getDeps\r\n```\r\n\r\nGenerate `deps.txt` and append extra entries from `extra-cp.txt`:\r\n```bash\r\n./gradlew getDeps -PextraClasspath=extra-cp.txt\r\n```\r\n\r\nGenerate `deps.txt` and exclude specific artifacts (by ID or path substring):\r\n```bash\r\n./gradlew getDeps \\\r\n    -PextraClasspath=extra-cp.txt \\\r\n    -PexcludeClasspath=com.google.guava:guava,slf4j-simple-1.7.36.jar\r\n```\r\n\r\n---\r\n\r\n## 2. Bootstrapping a Standalone Gradle Plugin\r\n\r\nIf you need this functionality across multiple projects and want to keep their `build.gradle` files clean, the best approach is to extract the logic into a standalone Gradle plugin project.\r\n\r\n1. **Initialize the Plugin Project**\r\n   Create a new directory (separate from `maven-get-deps`) and generate a Gradle plugin project:\r\n   ```bash\r\n   mkdir maven-get-deps-gradle-plugin\r\n   cd maven-get-deps-gradle-plugin\r\n   gradle init --type java-gradle-plugin\r\n   ```\r\n\r\n2. **Implement the Plugin Logic**\r\n   Write a custom Task class in Java or Kotlin that defines `@InputFiles extraClasspath` and resolves `project.getConfigurations().getByName(\"runtimeClasspath\")`.\r\n   \r\n3. **Publish Locally**\r\n   Publish the plugin to your `mavenLocal()` (`~/.m2/repository`) using the `maven-publish` plugin so that your other Gradle projects can consume it easily.\r\n\r\n## Why keep this separate?\r\nBy managing the Gradle integration as a separate project:\r\n- `maven-get-deps` remains a focused, fast, CLI/Maven-driven utility.\r\n- We avoid pulling `gradle-api` onto the classpath of this project, sidestepping version conflicts and large dependency downloads.\r\n- Our deployment philosophy stays lightweight.\r\n"},"MAVEN_LAYOUT":{"title":"Maven Artifact Layout & Regex Conversions","content":"# Maven Artifact Layout & Regex Conversions\r\n\r\nThe Maven repository structure is designed for simple, predictable mapping between artifact coordinates and filesystem paths. Understanding this pattern is key for mastering the tool's `gen-index` and `deps` commands, and understanding value such convention brings in maintaining a maven central repository, local cache, or a shared library folder for multiple application versions( even different applications).\r\n\r\n## The Directory Pattern\r\nA Maven artifact follows this fixed hierarchy:\r\n`[groupId (dots to slashes)] / [artifactId] / [version] / [artifactId]-[version][-classifier].[extension]`\r\n\r\n**Example:**\r\n- **Colon Format:** `org.slf4j:slf4j-api:2.0.7`\r\n- **Path Format:** `org/slf4j/slf4j-api/2.0.7/slf4j-api-2.0.7.jar`\r\n\r\n## Regex Visualisation\r\nYou can use Regex to convert between these formats in your own automation scripts.\r\n\r\n### 1. Path to Colon (JavaScript)\r\n```javascript\r\nconst path = \"org/slf4j/slf4j-api/2.0.7/slf4j-api-2.0.7.jar\";\r\n// Pattern: group/id/artifact/version/artifact-version[-classifier].ext\r\nconst regex = /^(.+)\\/([^\\/]+)\\/([^\\/]+)\\/\\2-\\3(?:-([^\\.]+))?\\.(.+)$/;\r\n\r\nconst colon = path.replace(regex, (m, g, a, v, c, e) => {\r\n  const groupId = g.replace(/\\//g, '.');\r\n  const classifier = c ? `:${c}` : '';\r\n  const extension = e !== 'jar' ? `@${e}` : '';\r\n  return `${groupId}:${a}:${v}${classifier}${extension}`;\r\n});\r\n// Result: \"org.slf4j:slf4j-api:2.0.7\"\r\n```\r\n\r\n### 2. Path to Colon (Java)\r\n```java\r\nString path = \"org/slf4j/slf4j-api/2.0.7/slf4j-api-2.0.7.jar\";\r\nPattern p = Pattern.compile(\"^(.+)/([^/]+)/([^/]+)/\\\\2-\\\\3(?:-([^.]+))?\\\\.(.+)$\");\r\nMatcher m = p.matcher(path);\r\n\r\nif (m.find()) {\r\n    String groupId = m.group(1).replace('/', '.');\r\n    String artifactId = m.group(2);\r\n    String version = m.group(3);\r\n    String classifier = m.group(4);\r\n    String extension = m.group(5);\r\n    \r\n    String colon = String.format(\"%s:%s:%s%s%s\", \r\n        groupId, artifactId, version,\r\n        classifier != null ? \":\" + classifier : \"\",\r\n        !\"jar\".equals(extension) ? \"@\" + extension : \"\"\r\n    );\r\n}\r\n```\r\n\r\n### 3. Colon to Path (JavaScript)\r\n```javascript\r\nconst colon = \"org.slf4j:slf4j-api:2.0.7\";\r\nconst regex = /^([^:]+):([^:]+):([^:]+)(?::([^@]+))?(?:@(.+))?$/;\r\n\r\nconst path = colon.replace(regex, (m, g, a, v, c, e) => {\r\n  const groupId = g.replace(/\\./g, '/');\r\n  const classifier = c ? `-${c}` : '';\r\n  const ext = e || 'jar';\r\n  return `${groupId}/${a}/${v}/${a}-${v}${classifier}.${ext}`;\r\n});\r\n// Result: \"org/slf4j/slf4j-api/2.0.7/slf4j-api-2.0.7.jar\"\r\n```\r\n\r\n#### 4. Colon to Path (Java)\r\n```java\r\nString colon = \"org.slf4j:slf4j-api:2.0.7\";\r\nPattern p = Pattern.compile(\"^([^:]+):([^:]+):([^:]+)(?::([^@]+))?(?:@(.+))?$\");\r\nMatcher m = p.matcher(colon);\r\n\r\nif (m.find()) {\r\n    String groupId = m.group(1).replace('.', '/');\r\n    String artifactId = m.group(2);\r\n    String version = m.group(3);\r\n    String classifier = m.group(4);\r\n    String extension = m.group(5) != null ? m.group(5) : \"jar\";\r\n\r\n    String path = String.format(\"%s/%s/%s/%s-%s%s.%s\",\r\n        groupId, artifactId, version,\r\n        artifactId, version,\r\n        classifier != null ? \"-\" + classifier : \"\",\r\n        extension\r\n    );\r\n}\r\n```\r\n"},"README.caching":{"title":"Granular Per-dependency Caching","content":"# Granular Per-dependency Caching\n\nTo significantly speed up the dependency resolution process, `maven-get-deps` implements a granular caching strategy that stores the transitive closure of every resolved dependency directly in the local Maven repository (`.m2/repository`).\n\n## Strategy Overview\n\nInstead of resolving the entire project's dependency tree in one go (which can involve expensive Maven metadata lookups and network latency for remote repositories), the tool resolves each direct dependency individually.\n\n1.  **Isolated Resolution**: For each direct dependency, the tool checks its local storage in `.m2`.\n2.  **Cache Hit**: If a valid cache file exists, the tool loads the list of transitive dependencies from it.\n3.  **Cache Miss**: If no cache is found, the tool performs a standard Maven resolution for that single dependency, extracts the transitive closure, and caches it for future use.\n4.  **Stitching**: All individual closures are combined and deduplicated to build the final resolution result for the project.\n\nThis approach ensures that a dependency resolved once is never resolved again, even if it's used in a different project.\n\n## Cache File Details\n\n### Location\nCache files are stored alongside the `.pom` file in the local Maven repository.\n`~/.m2/repository/{groupId}/{artifactId}/{version}/{artifactId}-{version}.pom.{scopeKey}.get-deps.cache`\n\n### Scope Key\nSince resolution depends on the requested scopes (e.g., `runtime`, `compile`, `all`), the cache filename includes a scope key to prevent incorrect reuse across different resolution modes. The scope key is a sorted, comma-separated list of scopes, or `all` if no scopes are specified.\n\n### File Format Example\nThe cache file is a simple text-based format containing metadata as comments and the transitive closure as a list of coordinates (`groupId:artifactId:classifier:extension:version`).\n\n**Example: `slf4j-simple-1.7.36.pom.runtime.get-deps.cache`**\n```text\n# root=org.slf4j:slf4j-simple:1.7.36::jar\n# scopes=runtime\norg.slf4j:slf4j-simple::jar:1.7.36\norg.slf4j:slf4j-api::jar:1.7.36\n```\n\n## Performance Optimization Strategy\n\nThe tool achieves its high performance (~450ms for 190+ dependencies) through several layered optimization techniques:\n\n1. **Strict Local Resolution**: The Maven Resolver is configured to favor the local repository and avoid slow remote metadata checks or snapshot updates.\n2. **Granular Per-Dependency Caching**: Instead of caching the whole project tree, we cache the transitive closure of *each direct dependency* individually. This ensures the cache is highly reusable across different projects using the same library.\n3. **Sibling Module Caching with Hash Validation**: Modules within the same Maven reactor (siblings) are also cached. To be CI-friendly, their cache is validated using a **SHA-256 hash** of their source `pom.xml`. If the hash matches the one stored in the cache header (`# pomHash=`), the cache is used; otherwise, it is re-resolved.\n4. **Parallelized Fragment Resolution**: The resolution of individual direct dependency closures (cache checks and Aether collections) is performed in parallel using a thread pool. This is particularly effective during cache misses or when reading many small cache files.\n5. **Batched Final Pathing**: All transitive coordinates are gathered into a single batched request to Aether for final path and size verification, minimizing redundant filesystem operations.\n\n## Benefits\n- **Speed**: Subsequent resolutions are extremely fast. \n    - Small project: ~2s -> ~500ms (4x speedup)\n    - Larger project (189 dependencies): ~9s -> ~450ms (20x speedup)\n- **Sibling Cache Impact**: On multimodule projects, the first resolution of siblings (before they are cached) can take ~2.8s. Subsequent resolutions using the sibling cache drop this to ~450ms, a saving of ~2.2s per run.\n- **Offline Support**: Once the cache is populated, resolution can happen entirely without network access or even Maven repository metadata.\n- **Shared across projects**: Reusing the same local repository automatically benefits from the work done in earlier projects.\n"},"README.cli":{"title":"maven-get-deps CLI Reference","content":"# maven-get-deps CLI Reference\n\nThe `maven-get-deps` CLI is the core Java-based implementation for resolving and managing dependencies. It can be run as a standard JAR or as a high-performance native binary compiled with GraalVM.\n\n## ­¤ÜĆ Quick Start\n\n```bash\n# Generate classpath from pom.xml\njava -jar maven-get-deps-cli.jar\n\n# Generate size report for an ad-hoc artifact\njava -jar maven-get-deps-cli.jar commons-lang:commons-lang:2.6 --report report.md\n\n# Copy dependencies to a 'lib' folder\njava -jar maven-get-deps-cli.jar pom.xml --dest-dir lib\n```\n\n## ­¤øĀ’ĖÅ Usage\n\n### Running via JAR\n```bash\njava -jar maven-get-deps-cli.jar [source] [options]\n```\n\n### Running via Native Binary (GraalVM)\nIf you have compiled the tool with GraalVM (see [README.dev.md](README.dev.md)), you can run it with instant startup:\n```bash\n./maven-get-deps [source] [options]\n```\n\n## ŌÜÖ’ĖÅ CLI Arguments\n\n| arg | description |\n|:---|:---|\n| `[source]` | Positional: `pom.xml`, Maven coordinates, or deps file. Default: `pom.xml` |\n| `-o, --output <file>` | Path to save the dependency list. |\n| `-d, --dest-dir <dir>` | Destination directory for JAR copies. |\n| `-n, --no-copy` | Disable JAR copying even if `--dest-dir` is set. |\n| `-c, --cache <dir>` | Local Maven repository (default: `~/.m2/repository`). |\n| `-r, --report <file>` | Path to save the dependency size report (Markdown). |\n| `-ex, --exclude-cp <G:A>` | Comma-separated list of artifact IDs or paths to exclude. |\n| `-s, --scopes <scopes>` | Comma-separated list of scopes (default: `runtime`). |\n| `-cp, --classpath` | Output as a valid OS-specific `CLASSPATH` string. |\n| `-cf, --convert-format <fmt>` | Convert input file format: `colon` or `path`. |\n| `-ecp, --extra-classpath <f>` | File containing additional classpath entries to append. |\n| `-es, --exclude-siblings` | Exclude artifacts from the same reactor (default: `false`). |\n| `-v, --version` | Show tool version. |\n\n## ­¤ō¢ Key Features\n\n### Transitive Dependency Resolution\nResolves the full dependency tree for any project or ad-hoc artifact.\n\n### Dependency Size Report\nProvides a detailed breakdown of artifact sizes with incremental attribution (who brought in what).\n```bash\njava -jar maven-get-deps-cli.jar pom.xml --report report.md\n```\n\n### Classpath Assembly\nGenerates environment-ready `CLASSPATH` strings for scripts (`.sh`, `.bat`).\n\n### Artifact Copying\nStreamlines deployment by gathering all required JARs into a single directory.\n\n## ­¤ōØ Input File Format\nThe CLI supports a `dependencies.txt` file as a source:\n```text\n# Local application JAR\n./app.jar\n\n# Maven dependencies\norg.slf4j:slf4j-api:2.0.7\ncom.fasterxml.jackson.core:jackson-databind:2.15.2\n```\n\n## ­¤ÅŚ’ĖÅ How It Works\n\n- **Source (Cache)**: Your local Maven repository (`~/.m2/repository`) is used as the primary source for JARs and POMs.\n- **Destination (`destDir`)**: Optional standalone folder. If `copyJars=true`, artifacts are copied from Source to Destination.\n- **Interchangeable Paths**: Relative paths generated follow the standard Maven layout (`group/artifact/version/file.jar`).\n\n## ŌÜĪ Performance Tip: GraalVM\nWhile the [Zig version](README.get_deps.md) is the fastest, the Java CLI compiled with **GraalVM native-image** offers a balanced approach ŌĆö providing full Maven-compatible logic with near-instant startup (~60ms vs 300ms for JIT).\n\nSee [README.dev.md](README.dev.md) for build instructions.\n"},"README.dev":{"title":"maven-get-deps Development Guide","content":"# maven-get-deps Development Guide\r\n\r\nThis document describes how to build, test, and maintain the `maven-get-deps` project.\r\n\r\n# Build\r\n\r\nTo build the project, ensure you have Java 17+ and Maven installed.\r\n\r\nThe project is structured with two profiles:\r\n1. The **Maven Plugin (Mojo)**: Built by default to keep the deployable artifact thin.\r\n2. The **CLI Executable**: Built via the `executable` profile, including CLI parsing logic and outputting a fat JAR.\r\n\r\n```powershell\r\n$env:JAVA_HOME = \"C:\\Program Files\\Java\\jdk-17\"\r\n\r\n# Build the Maven plugin (default profile)\r\nmvn clean install -DskipTests\r\n\r\n# Build the CLI executable JAR\r\nmvn clean package -Pexecutable -DskipTests\r\n```\r\n\r\n# GraalVM Native Image Build\r\n\r\nOn windows difference to run the tool on pom.xml of this project is significant (5x). \r\n- 300ms -  `Measure-Command { java -jar .\\target\\maven-get-deps-1.0.0-cli.jar}`\r\n- 60ms - `Measure-Command { .\\target\\maven-get-deps.exe | Out-Default }`\r\n\r\nYou can build a standalone native executable for the CLI using GraalVM. Note that this requires both `executable` and `native` profiles.\r\n\r\n#### Prerequisites (Windows)\r\n1.  **GraalVM JDK**: You have it installed at `C:\\Program Files\\Java\\graalvm-jdk-25+37.1`.\r\n2.  **Visual Studio 2022**: Required for the native toolchain (`cl.exe`).\r\n    - Open **Visual Studio Installer**.\r\n    - Select **Desktop development with C++** workload.\r\n    - Under **Optional** components (on the right), ensure these are checked:\r\n        - **MSVC v143 - VS 2022 C++ x64/x86 build tools (Latest)**\r\n        - **Windows 10/11 SDK** (e.g., Windows 11 SDK 10.0.22621.0)\r\n    - Under **Language packs**, ensure **English** is installed (GraalVM might fail to parse error messages in other languages).\r\n3.  **Developer PowerShell**: Run the build from a \"Developer PowerShell for VS 2022\" or ensure `cl.exe` is in your PATH (usually handled by the Developer PowerShell).\r\n\r\n#### Steps\r\n1.  Set your environment:\r\n    ```powershell\r\n    $env:JAVA_HOME = \"C:\\Program Files\\Java\\graalvm-jdk-25+37.1\"\r\n    $env:Path = \"$env:JAVA_HOME\\bin;\" + $env:Path\r\n    ```\r\n2.  Build the native image:\r\n    ```powershell\r\n    mvn clean package -Pexecutable,native -DskipTests\r\n    ```\r\n    The resulting binary will be located at `target/maven-get-deps.exe`.\r\n\r\n### Linux Native Image Build (via WSL)\r\n\r\nYou can build a Linux binary using Windows Subsystem for Linux (WSL).\r\n\r\n#### Prerequisites (WSL/Ubuntu)\r\n1.  **Install Build Tools**:\r\n    ```bash\r\n    sudo apt-get update\r\n    sudo apt-get install -y build-essential libz-dev zlib1g-dev\r\n    ```\r\n2.  **Install GraalVM**:\r\n    ```bash\r\n    sudo mkdir -p /opt/graalvm\r\n    curl -L https://download.oracle.com/graalvm/21/latest/graalvm-jdk-21_linux-x64_bin.tar.gz | sudo tar -xz -C /opt/graalvm --strip-components=1\r\n    ```\r\n3.  **Install Maven**: `sudo apt-get install -y maven`.\r\n\r\n#### Steps\r\n1.  Set your environment:\r\n    ```bash\r\n    export JAVA_HOME=/opt/graalvm\r\n    export PATH=$JAVA_HOME/bin:$PATH\r\n    ```\r\n2.  Build the native image:\r\n    ```bash\r\n    mvn clean package -Pnative -DskipTests\r\n    ```\r\n    The resulting binary will be `target/maven-get-deps`.\r\n\r\n### Cross-Platform Caveats\r\n- **No Cross-Compilation**: GraalVM `native-image` does not support building a Linux binary from Windows (or vice-versa). You must build on the target OS.\r\n- **GLIBC Dependency**: By default, Linux binaries are dynamically linked against `glibc`. A binary built on Ubuntu might not run on very old Linux distros or distros using `musl` (like Alpine) unless built with static linking.\r\n- **Resources**: Ensure `resource-config.json` is maintained if new Maven resources (like Super POMs) are needed at runtime.\r\n\r\n### Maintaining Native Image Configuration\r\n\r\nGraalVM Native Image builds use Ahead-of-Time (AOT) compilation, which requires that all dynamic features of the Java language (like reflection, dynamic proxies, and resource loading) are identified and configured at build time. Since `maven-get-deps` relies on Maven Resolver (Aether), Jackson, and H2, which use reflection heavily, we must maintain a set of \"reachability metadata\" files in `src/main/resources/META-INF/native-image`.\r\n\r\n#### GraalVM Tracing Agent\r\nThe project uses the **GraalVM Tracing Agent** to capture these requirements by observing the application's behavior during a normal JVM run.\r\n\r\n#### Metadata Merger Utility\r\nTo prevent overwriting manually tuned metadata (like specific reflection entries for Maven models) with new agent-generated data, we use the `MetadataMerger` Java utility. This tool performs a smart merge of `reflection` and `resources` configurations, ensuring that:\r\n1. Unique entries from both old and new files are preserved.\r\n2. If an entry exists in both, the newer one (from the agent) is preferred.\r\n3. The resulting JSON is alphabetically sorted to keep Git diffs clean.\r\n\r\n#### Steps to update metadata:\r\n1.  **Run the Agent**: Execute the CLI JAR with the tracing agent enabled:\r\n    ```powershell\r\n    # Windows\r\n    $env:JAVA_HOME = \"C:\\Program Files\\Java\\graalvm-jdk-25+37.1\"\r\n    & \"$env:JAVA_HOME\\bin\\java.exe\" -agentlib:native-image-agent=config-output-dir=agent-output -jar target/maven-get-deps-1.0.0-cli.jar --pom pom.xml --no-copy\r\n    ```\r\n3.  **Merge the Metadata**: Use the internal merger utility to combine the results:\r\n    ```powershell\r\n    # Run the merger using the CLI jar (GraalVM Java 21+ required for execution)\r\n    $OLD_META = \"src/main/resources/META-INF/native-image/hr.hrg/maven-get-deps/reachability-metadata.json\"\r\n    $NEW_META = \"agent-output/reachability-metadata.json\"\r\n    \r\n    java -cp target/maven-get-deps-1.0.0-cli.jar hr.hrg.maven.getdeps.MetadataMerger `\r\n        $OLD_META $NEW_META $OLD_META\r\n    ```\r\n4.  **Rebuild**: Run the native build again. The plugin will automatically pick up configurations from `META-INF/native-image`.\r\n"},"README.docker":{"title":"Thin Docker Images with maven-get-deps","content":"# Thin Docker Images with maven-get-deps\r\n\r\nWhile the author generally prefers simpler deployment models (like shared network drives), combining the Zig version of `maven-get-deps` with Docker allows for extremely thin and efficient container images.\r\n\r\n## The Problem with Fat JARs in Docker\r\n\r\nStandard Docker practices often involve building a \"fat JAR\" (using Maven Shade or Spring Boot) and copying it into an image. This has several downsides:\r\n1.  **Bloated Layers**: Every change to your code requires re-uploading the entire JAR (including all 50MB-100MB of static dependencies).\r\n2.  **Memory Overhead**: Fat JARs can be slower to start and harder for GraalVM to optimize.\r\n3.  **No Deduplication**: If you have 10 microservices sharing 90% of the same libraries, Docker will store those libraries 10 times.\r\n\r\n## The \"Thin Image\" Strategy\r\n\r\nInstead of building a fat JAR, we keep the dependencies in a separate volume/cache and use `maven-get-deps` to assemble the classpath at runtime.\r\n\r\n### 1. Local Development (Bind-Mount)\r\n\r\nIn local development, you can mount your local `.m2` repository directly into the container.\r\n\r\n**Dockerfile.local**\r\n```dockerfile\r\nFROM eclipse-temurin:21-jre-alpine\r\nWORKDIR /app\r\n\r\n# Copy the Zig tool and dependency list\r\nCOPY target/get_deps /usr/local/bin/\r\nCOPY dependencies.txt .\r\nCOPY target/my-app.jar .\r\n\r\n# Use a startup script to generate CLASSPATH on the fly\r\nCMD CP_STRING=$(get_deps -i dependencies.txt -cf path --classpath --cache /root/.m2/repository) && \\\r\n    export CLASSPATH=\"my-app.jar:$CP_STRING\" && \\\r\n    java com.example.Main\r\n```\r\n\r\n**Run command:**\r\n```bash\r\ndocker run -v ~/.m2/repository:/root/.m2/repository my-app-local\r\n```\r\n\r\n### 2. Production Deployment (Permissive Environment)\r\n\r\nIn environments where the container has internet access, you can allow the Zig tool to fill a persistent volume cache from inside the container.\r\n\r\n**Dockerfile.prod**\r\n```dockerfile\r\nFROM eclipse-temurin:21-jre-alpine\r\nWORKDIR /app\r\nCOPY target/get_deps /usr/local/bin/\r\nCOPY dependencies.txt .\r\nCOPY target/my-app.jar .\r\n\r\n# Entrypoint script that ensures deps are present before starting\r\nCOPY entrypoint.sh .\r\nRUN chmod +x entrypoint.sh\r\nENTRYPOINT [\"./entrypoint.sh\"]\r\n```\r\n\r\n**entrypoint.sh**\r\n```sh\r\n#!/bin/sh\r\n# 1. Download missing jars into the mounted cache volume\r\nget_deps -i dependencies.txt --download --cache /data/maven-cache\r\n\r\n# 2. Generate classpath\r\nCP_STRING=$(get_deps -i dependencies.txt -cf path --classpath --cache /data/maven-cache)\r\n\r\n# 3. Exec java\r\nexport CLASSPATH=\"my-app.jar:$CP_STRING\"\r\nexec java com.example.Main\r\n```\r\n\r\n---\r\n\r\n## Kubernetes Integration (The \"Pre-fetch\" Pattern)\r\n\r\nIn highly secure Kubernetes environments, application containers are often restricted from writing to disks or accessing the public internet.\r\n\r\n### Suggestion: InitContainer for Dependency Resolution\r\n\r\nUse a dedicated `InitContainer` to handle dependency fetching. This keeps your main application container strictly \"Read-Only\" and avoids including the downloader tool in the final runtime image.\r\n\r\n**Kubernetes Deployment Snippet:**\r\n```yaml\r\nspec:\r\n  volumes:\r\n    - name: maven-cache-vol\r\n      persistentVolumeClaim:\r\n        claimName: shared-maven-cache\r\n  \r\n  initContainers:\r\n    - name: dep-fetcher\r\n      image: alpine:latest # Or a custom image with the Zig binary\r\n      volumeMounts:\r\n        - name: maven-cache-vol\r\n          mountPath: /data/cache\r\n      command: [\"/bin/sh\", \"-c\"]\r\n      args:\r\n        - |\r\n          # The dependencies.txt would be provided via ConfigMap or inside the image\r\n          /usr/local/bin/get_deps --input /app/dependencies.txt --download --cache /data/cache\r\n  \r\n  containers:\r\n    - name: my-java-app\r\n      image: my-thin-app-image:latest\r\n      volumeMounts:\r\n        - name: maven-cache-vol\r\n          mountPath: /data/cache\r\n          readOnly: true # App container cannot modify the cache\r\n      env:\r\n        - name: JAVA_OPTS\r\n          value: \"-Dskip.something=true\"\r\n      command: [\"/bin/sh\", \"-c\"]\r\n      args:\r\n        - |\r\n          # Generate CP string using the Zig tool (also included in the app image)\r\n          CP=$(/usr/local/bin/get_deps -i /app/dependencies.txt -cf path --classpath --cache /data/cache)\r\n          export CLASSPATH=\"/app/my-app.jar:$CP\"\r\n          exec java $JAVA_OPTS com.example.Main\r\n```\r\n\r\n### Benefits of this K8s pattern:\r\n1.  **Security**: Only the `InitContainer` needs internet access. The `AppContainer` can be fully isolated.\r\n2.  **Immutability**: The shared cache ensures that all pods in a replica set use the exact same JAR files.\r\n3.  **Efficiency**: JARs are downloaded once per node (if using `ReadWriteMany` or local node caches) and shared across all pods.\r\n"},"README.download":{"title":"Download Guide: `maven-get-deps` Tools","content":"# Download Guide: `maven-get-deps` Tools\n\nThis guide provides a central location for downloading project artifacts and instructions for setting them up on your system.\n\n## 1. Tool Overview\n\n| Tool | Language | Primary Purpose | Examples | Docs |\n|---|---|---|---|---|\n| **maven_get_deps** | Java | **Transitive resolution**: Full-featured expansion, downloads, and size reporting. | [View](#java-maven_get_deps) | [Docs](README.maven_get_deps.md) |\n| **cve12** | Java | **CVE Scanning**: Focused offline scanner using OWASP v12. | [View](#java-cve12) | [Docs](README.usage-cve.md) |\n| **get_deps** | Zig | **Ultra-fast Path Resolution**: Recommended for production runtimes. | [View](#zig-get_deps) | [Docs](README.get_deps.md) |\n| **version_manager** | Zig | **Deployment**: Zero-downtime atomic symlink swaps. | [View](#zig-version_manager) | [Docs](README.version_manager.md) |\n| **gen_index** | Zig | **Metadata**: Generate deployment index files. | [View](#zig-gen_index) | [Docs](README.gen_index.md) |\n\n---\n\n## 2. Latest Releases\n\nDownload artifacts from the [GitHub Releases Page](https://github.com/hrgdavor/maven-get-deps/releases/latest).\n\n### Java Implementation (Native & JAR)\n- **Linux (x64)**: `maven-get-deps-linux-x64.tar.gz`, `cve12-linux-x64.tar.gz`\n- **Windows (x64)**: `maven-get-deps-windows-x64.zip`, `cve12-windows-x64.zip`\n- **Platform Independent**: `maven-get-deps-cli.jar`, `cve12-cli.jar`\n\n### Zig Implementation (Native Binaries)\n- **Linux (x64)**: `get-deps-zig-linux-x64.tar.gz`, `version-manager-zig-linux-x64.tar.gz`, `gen-index-zig-linux-x64.tar.gz`\n- **Linux (ARM64)**: `get-deps-zig-linux-arm64.tar.gz`, `version-manager-zig-linux-arm64.tar.gz`, `gen-index-zig-linux-arm64.tar.gz`\n- **Windows (x64)**: `get-deps-zig-windows-x64.zip`, `version-manager-zig-windows-x64.zip`, `gen-index-zig-windows-x64.zip`\n\n---\n\n## 3. Download & Extract Examples\n\n### <a name=\"java-maven_get_deps\"></a> Java Reference Tool (`maven_get_deps`)\n\nFull transitive expansion and reporting.\n\n- **Linux (x64)**\n  ```bash\n  curl -L -O https://github.com/hrgdavor/maven-get-deps/releases/latest/download/maven-get-deps-linux-x64.tar.gz\n  tar -xzf maven-get-deps-linux-x64.tar.gz\n  ./maven-get-deps --version\n  ```\n- **Windows (x64)**\n  ```powershell\n  Invoke-WebRequest -Uri \"https://github.com/hrgdavor/maven-get-deps/releases/latest/download/maven-get-deps-windows-x64.zip\" -OutFile \"maven-get-deps.zip\"\n  Expand-Archive -Path \"maven-get-deps.zip\" -DestinationPath \".\"\n  .\\maven-get-deps.exe --version\n  ```\n- **CLI JAR (Generic)**\n  ```bash\n  curl -L -O https://github.com/hrgdavor/maven-get-deps/releases/latest/download/maven-get-deps-cli.jar\n  java -jar maven-get-deps-cli.jar --version\n  ```\n\n---\n\n### <a name=\"java-cve12\"></a> CVE Scanner (`cve12`)\n\nFocused vulnerability scanner using OWASP v12.\n\n- **Linux (x64)**\n  ```bash\n  curl -L -O https://github.com/hrgdavor/maven-get-deps/releases/latest/download/cve12-linux-x64.tar.gz\n  tar -xzf cve12-linux-x64.tar.gz\n  ./cve12 --help\n  ```\n- **Windows (x64)**\n  ```powershell\n  Invoke-WebRequest -Uri \"https://github.com/hrgdavor/maven-get-deps/releases/latest/download/cve12-windows-x64.zip\" -OutFile \"cve12.zip\"\n  Expand-Archive -Path \"cve12.zip\" -DestinationPath \".\"\n  .\\cve12.exe --help\n  ```\n- **CLI JAR (Generic)**\n  ```bash\n  curl -L -O https://github.com/hrgdavor/maven-get-deps/releases/latest/download/cve12-cli.jar\n  java -jar cve12-cli.jar --help\n  ```\n\n---\n\n### <a name=\"zig-get_deps\"></a> Zig Dependency Resolver (`get_deps`)\n\nUltra-fast path resolution and Maven cache filler.\n\n- **Linux (x64)**: `get-deps-zig-linux-x64.tar.gz`\n- **Linux (ARM64)**: `get-deps-zig-linux-arm64.tar.gz`\n- **Windows (x64)**: `get-deps-zig-windows-x64.zip`\n- **Setup (Example)**:\n  ```bash\n  curl -L -O https://github.com/hrgdavor/maven-get-deps/releases/latest/download/get-deps-zig-linux-x64.tar.gz\n  tar -xzf get-deps-zig-linux-x64.tar.gz\n  ./get_deps --version\n  ```\n\n---\n\n### <a name=\"zig-version_manager\"></a> Zig Version Manager (`version_manager`)\n\nAtomic symlink deployments.\n\n- **Artifacts**: `version-manager-zig-linux-x64.tar.gz`, `version-manager-zig-linux-arm64.tar.gz`, `version-manager-zig-windows-x64.zip`\n- **Setup (Example)**:\n  ```bash\n  curl -L -O https://github.com/hrgdavor/maven-get-deps/releases/latest/download/version-manager-zig-linux-x64.tar.gz\n  tar -xzf version-manager-zig-linux-x64.tar.gz\n  ./version_manager --help\n  ```\n\n---\n\n### <a name=\"zig-gen_index\"></a> Zig Index Generator (`gen_index`)\n\nGenerate deployment metadata.\n\n- **Artifacts**: `gen-index-zig-linux-x64.tar.gz`, `gen-index-zig-linux-arm64.tar.gz`, `gen-index-zig-windows-x64.zip`\n- **Setup (Example)**:\n  ```bash\n  curl -L -O https://github.com/hrgdavor/maven-get-deps/releases/latest/download/gen-index-zig-linux-x64.tar.gz\n  tar -xzf gen-index-zig-linux-x64.tar.gz\n  ./gen_index --help\n  ```\n"},"README.gen_index":{"title":"gen_index: Version Index Generator","content":"# gen_index: Version Index Generator\n\nThe `gen_index` tool automates the creation of the `versions.json` file by scanning directories. This index is used by `version_manager` to know where each version is physically located on disk.\n\n## Usage\n\n```bash\n./gen_index --folders folders.txt --output versions.json\n```\n\n### Options\n\n| Option | Description | Default |\n| :--- | :--- | :--- |\n| `--folders <file>` | File containing a list of base directories to scan. | (Required) |\n| `-o, --output <file>` | Output index file path. | `versions.json` |\n| `--version-file <name>` | The filename to look for inside directories to extract version data. | `version.json` |\n\n## Folder Scanning Logic\n\n`gen_index` reads each directory listed in the `--folders` file and looks for immediate subdirectories that contain a `version.json` (or the specified `--version-file`).\n\n### folders.txt example\n```text\n/opt/apps/my-service/deployments\n/var/lib/backups/my-service\n```\n\n### version.json format\nIf a subdirectory contains this file, it is included in the index:\n```json\n{\n  \"version\": \"1.2.4\",\n  \"timestamp\": 1710123456,\n  \"description\": \"Optional metadata\"\n}\n```\n\n## Integrating with version_manager\n\nOnce generated, point your `manifest.json`'s `version_index` field to the output of `gen_index`:\n\n```json\n{\n  \"current_version\": \"1.2.4\",\n  \"version_index\": \"versions.json\",\n  ...\n}\n```\n"},"README.get_deps":{"title":"get_deps: Path Resolution & Download (Zig Edition)","content":"# get_deps: Path Resolution & Download (Zig Edition)\n\nThe `get_deps` tool is an ultra-fast, zero-dependency implementation written in Zig. It focuses on critical deployment and resolution tasks: **transitive resolution**, **path resolution**, **filling missing artifacts**, and **classpath generation**.\n\n> [!TIP]\n> **Native Transitive Resolution**: Starting with the latest version, the Zig tool supports the `mimic` command for full transitive dependency expansion directly from POM files, achieving parity with the Java implementation with near-instant startup.\n\n## Usage\n\n### 1. Transitive Resolution (`mimic`)\nResolve the full dependency tree for a Maven project directly from its `pom.xml`. This command replicates the functionality of the Java `MimicDependencyResolver` with the performance of native Zig.\n\n```sh\n# Resolve dependencies for the CLI module, scanning the current directory as reactor\nget_deps mimic --pom maven-get-deps-cli/pom.xml --reactor .\n\n# Resolve with a specific local cache and additional remote repository\nget_deps mimic -p pom.xml -c ./target/m2 --repo https://repo.maven.apache.org/maven2\n```\n\n### 2. Generate a CLASSPATH string (`deps`)\nPerfect for use in bash/PowerShell scripts to inject dependencies into an environment variable.\n```sh\n# Linux/macOS\nCP_STRING=$(get_deps deps -i deps.txt -cf path --classpath --cache ~/.m2/repository)\nexport CLASSPATH=\"app.jar:$CP_STRING\"\n\n# Windows (PowerShell)\n$CP_STRING = .\\get_deps.exe deps -i deps.txt -cf path --classpath --cache $HOME\\.m2\\repository\n$env:CLASSPATH = \"app.jar;\" + $CP_STRING\n```\n\n### 3. Download missing Jars\nThe tool can act as a lightweight \"downloader\" for your shared repository.\n```powershell\nget_deps deps --input dependencies.txt --download --cache /opt/shared/lib\n```\nThis will check `/opt/shared/lib` for each dependency in `dependencies.txt`. If a JAR is missing, it will be downloaded from Maven Central.\n\n### 4. Format Conversion\nConvert a list of paths back to colon format for easier reading or comparison.\n```powershell\nget_deps deps -i list_of_paths.txt -cf colon\n```\n\n## Input Format (`cp.txt` / `deps.txt`)\nThe input files define the runtime environment. They include the application itself and its Maven dependencies.\n\n```text\n# Local application JAR (resolved relative to cp.txt location)\n./app.jar\n\n# Maven dependencies (resolved via the --cache directory)\norg.slf4j:slf4j-api:2.0.7\ncom.fasterxml.jackson.core:jackson-databind:2.15.2\ncommons-io:commons-io:2.13.0\n```\n\n> [!TIP]\n> **Comments & Empty Lines**: All input files support shell-style comments starting with `#` and empty lines.\n\n> [!TIP]\n> **Relative Paths**: By including `./app.jar` in `cp.txt`, the tool automatically resolves it to the full path of the JAR inside that specific folder.\n\n## Argument Reference\n-   `-i, --input <file>`: Input text file containing a list of dependencies.\n-   `-cf, --convert-format <format>`: Target format for output (`colon` | `path`).\n-   `-cp, --classpath`: Output a single OS-separated CLASSPATH string.\n-   `-c, --cache <dir>`: Base directory for paths (defaults to `~/.m2/repository`).\n-   `--download`: Automatically download missing JARs from Maven Central to the cache directory.\n\n## Production Example: Java & Systemd\nSee how to use `get_deps` in a systemd service to dynamically generate classpaths:\n\n```ini\nExecStartPre=/bin/sh -c 'echo \"CP=$(./get_deps deps -i current/cp.txt --classpath --cache /opt/shared/m2)\" > /run/my-app.env'\nEnvironmentFile=/run/my-app.env\nExecStart=/usr/bin/java -cp \"${CP}\" com.example.Main\n```\n"},"README.maven-plugin":{"title":"maven-get-deps Maven Plugin","content":"# maven-get-deps Maven Plugin\n\nThe `maven-get-deps` plugin allows you to integrate dependency resolution directly into your Maven build lifecycle.\n\n## ­¤ÜĆ Usage\n\nRun the plugin directly from the terminal to resolve or copy dependencies:\n\n```bash\nmvn hr.hrg:maven-get-deps:1.0.1:get-deps -DdestDir=lib -DcopyJars=true -DoutputFile=deps.txt\n```\n\n## ŌÜÖ’ĖÅ Configuration Parameters\n\n| Parameter | Description |\n|---|---|\n| `destDir` | Directory for listing/copying artifacts |\n| `copyJars` | Copy JARs to `destDir` (default: `false`) |\n| `outputFile` | Save dependency list to file |\n| `scopes` | Scopes to include (default: `runtime`) |\n| `reportFile` | Markdown dependency-size report |\n| `classpath` | Output as OS-separated `CLASSPATH` string (default: `false`) |\n| `cache` | Override local Maven repository path |\n| `excludeSiblings` | Exclude artifacts from the same reactor (default: `false`) |\n\n## ­¤ō¢ Features\n\n- **Direct POM Integration**: Inherits project context and profiles.\n- **Transitive Resolution**: Uses the standard Maven Aether/Artifact resolution engine.\n- **Deployment Preparation**: Easily gather dependencies for thin JAR deployments during the `package` phase.\n"},"README.mcs":{"title":"Comparison with mthmulders/mcs","content":"# Comparison with mthmulders/mcs\r\n\r\nThis document explores the relationship between `maven-get-deps` and the [mthmulders/mcs](https://github.com/mthmulders/mcs) project, identifying overlaps and potential for mutual benefit.\r\n\r\n## What is mthmulders/mcs?\r\n\r\n`mcs` (Maven Central Search) is a fast, GraalVM-compiled command-line tool designed for searching the Maven Central Repository. It provides:\r\n- **Wildcard Search**: Find artifacts by name.\r\n- **Coordinate Search**: Get dependency snippets for various build tools (Maven, Gradle, etc.).\r\n- **Class-name Search**: Identify which artifacts contain a specific class.\r\n- **Vulnerability Scanning**: Integration with Sonatype OSS Index to report CVEs in search results.\r\n\r\n## Overlap of Functions\r\n\r\nThe direct functional overlap is minimal, as the tools focus on different stages of the development lifecycle:\r\n- **`mcs`**: Discovery phase (finding dependencies).\r\n- **`maven-get-deps`**: Build/Deployment phase (resolving transitivity, downloading, classpath generation, and size auditing).\r\n\r\nHowever, they share a common goal of providing a fast, standalone CLI experience for Maven-related tasks without the overhead of the full Maven JVM environment.\r\n\r\n## Opportunity for maven-get-deps (Integration/PR ideas)\r\n\r\n1.  **Vulnerability Scanning**: Leverage the resolved transitive dependency tree to provide a fast, accurate CLI vulnerability scanner for deployments.\r\n2.  **Class-Name Reverse Search**: Integrate class search to help resolve `ClassNotFoundException` issues by identifying missing dependencies directly from the CLI.\r\n3.  **Ad-Hoc Coordinate Resolution**: Allow resolving and downloading artifacts/transitives without a `pom.xml` (e.g., `maven-get-deps --artifact com.foo:bar:1.2.3`).\r\n\r\n## Opportunity for mthmulders/mcs (Integration/PR ideas)\r\n\r\n1.  **\"True Weight\" Transitive Size Calculation**: Use `maven-get-deps`' resolution logic to show the total transitive weight of a library during the discovery phase.\r\n2.  **Instant Download & Classpath Generation**: An alternative to `mvn dependency:get` or Grape, allowing users to fetch a library and its transitives and instantly get a classpath string for local execution.\r\n"},"README.static-docker":{"title":"Static Classpath Deployment for Docker","content":"# Static Classpath Deployment for Docker\r\n\r\nFor highly optimized production environments, you can generate a **static CLASSPATH string** during your build phase and bake it directly into your `Dockerfile` or a startup script. \r\n\r\nThis approach is the most efficient because:\r\n1.  **Zero Runtime Overhead**: No tools (Zig or Java) need to run at container startup to resolve or download dependencies.\r\n2.  **Immutability**: The classpath is fixed at build time, ensuring the exact same environment across all deployments.\r\n3.  **Security**: You don't need the `maven-get-deps` binary or Maven repository access inside your production container.\r\n\r\n## Strategy: Build-Time Generation\r\n\r\nIn this model, your CI/CD pipeline (e.g., GitHub Actions, Jenkins) or local build script performs the resolution and generates a file containing the final classpath string.\r\n\r\n### 1. Simple Project\r\n\r\nIf you have a single JAR and want to use dependencies from a mounted volume:\r\n\r\n**Build Phase:**\r\n```bash\r\n# Generate dependencies.txt\r\nmvn hr.hrg:maven-get-deps-plugin:get-deps -Doutput=dependencies.txt\r\n\r\n# Generate the static classpath string\r\n# (Assumes dependencies are in /libs inside the container)\r\nget_deps -i dependencies.txt -cf path --classpath --cache /libs > static_cp.txt\r\n```\r\n\r\n**Dockerfile:**\r\n```dockerfile\r\nFROM eclipse-temurin:21-jre-alpine\r\nWORKDIR /app\r\nCOPY target/my-app.jar .\r\nCOPY static_cp.txt .\r\n\r\n# Start the app using the pre-baked classpath\r\nCMD java -cp \"my-app.jar:$(cat static_cp.txt)\" com.example.Main\r\n```\r\n\r\n---\r\n\r\n## Multi-Module Projects & Extra Classpath\r\n\r\nIn multi-module projects, you often have local JARs (from other modules) that aren't in a Maven repository yet. You can use the `--extra-classpath` flag to merge these local paths into your final classpath.\r\n\r\n### Example: Multi-Module Setup\r\n\r\nImagine a project with:\r\n- `core/target/core.jar`\r\n- `web/target/web.jar`\r\n- External dependencies from Maven.\r\n\r\n**1. Create `local_modules.txt`:**\r\n```text\r\n/app/core.jar\r\n/app/web.jar\r\n```\r\n\r\n**2. Generate combined classpath at build time:**\r\n```bash\r\n# Resolve external deps from one of the modules\r\nget_deps -i web/dependencies.txt -cf path --classpath --cache /libs --extra-classpath local_modules.txt > full_cp.txt\r\n```\r\n\r\n**3. Dockerfile:**\r\n```dockerfile\r\nFROM eclipse-temurin:21-jre-alpine\r\nWORKDIR /app\r\n\r\n# Copy all local artifacts\r\nCOPY core/target/core.jar .\r\nCOPY web/target/web.jar .\r\n# Copy the pre-generated full classpath\r\nCOPY full_cp.txt .\r\n\r\nCMD java -cp \"$(cat full_cp.txt)\" com.example.MainWeb\r\n```\r\n\r\n## When to use this strategy?\r\n- **Production**: When stability and startup speed are critical.\r\n- **Security-Hardened Environments**: When you want minimize the tools installed in the image.\r\n- **Large-Scale Deployments**: When thousands of pods starting at once would otherwise hammer a shared cache or network drive.\r\n\r\n---\r\n\r\n## Kubernetes Integration\r\n\r\nWhen using a static classpath in Kubernetes, your Pod definition becomes extremely simple and highly secure. The application container runs entirely in read-only mode, mounting a pre-populated shared Maven cache (or using an InitContainer from a utility image to populate it).\r\n\r\n**Kubernetes Deployment Snippet:**\r\n```yaml\r\napiVersion: apps/v1\r\nkind: Deployment\r\nmetadata:\r\n  name: my-static-app\r\nspec:\r\n  replicas: 3\r\n  template:\r\n    spec:\r\n      volumes:\r\n        - name: shared-maven-cache\r\n          persistentVolumeClaim:\r\n            claimName: maven-repo-pvc\r\n      \r\n      # Optional: Use a generic InitContainer to download dependencies if they aren't pre-populated \r\n      # initContainers:\r\n      #   - name: dep-fetcher\r\n      #     image: custom-zig-tool-image:latest\r\n      #     volumeMounts:\r\n      #       - name: shared-maven-cache\r\n      #         mountPath: /libs\r\n      #     command: [\"get_deps\", \"-i\", \"/config/dependencies.txt\", \"--download\", \"--cache\", \"/libs\"]\r\n      \r\n      containers:\r\n        - name: my-java-app\r\n          image: my-static-app-image:latest\r\n          volumeMounts:\r\n            - name: shared-maven-cache\r\n              mountPath: /libs\r\n              readOnly: true # The application cannot modify the dependencies\r\n          securityContext:\r\n            readOnlyRootFilesystem: true # Maximum security, since CP is static and deps are read-only\r\n```\r\n\r\n### Benefits for Kubernetes:\r\n1. **Ultra-Fast Pod Startup**: No dynamic classpath generation or dependency downloads on the critical path of the application container.\r\n2. **Maximum Security**: The application container (`my-static-app-image`) contains only the JRE, your thin JAR, and `static_cp.txt`. It does not contain `get_deps` and can run with a read-only root filesystem.\r\n3. **Immutability**: Every replica starts with the exact same pre-computed classpath.\r\n"},"README.systemd":{"title":"Systemd Deployment Guide (Multi-Module Daemon)","content":"# Systemd Deployment Guide (Multi-Module Daemon)\r\n\r\nThis guide demonstrates how to deploy a Java daemon using `systemd` and `maven-get-deps` for lean, zero-downtime-ready management. We'll use the [examples/multi](../examples/multi) project as our reference.\r\n\r\n## 1. Project Structure\r\nThe example project consists of:\r\n- `odt-lib`: A library for ODT generation.\r\n- `md-to-odt`: The daemon watching a folder for Markdown files.\r\n\r\n## 2. Deployment Structure\r\nA production-ready version folder (e.g., `/opt/md-to-odt/v1.0.0`) must be self-contained and portable. It should contain:\r\n\r\n| File | Description |\r\n| :--- | :--- |\r\n| `md-to-odt.jar` | The main application JAR. |\r\n| `odt-lib.jar` | The local library JAR (not yet in Central/Nexus). |\r\n| `cp.txt` | Full list of dependencies produced by `maven-get-deps`. |\r\n\r\n> [!NOTE]\r\n> `logback.xml` and other shared assets (e.g., templates, global configs) should be kept in the deployment root (e.g., `/opt/md-to-odt/`) rather than inside specific version folders. This allows configuration to be decoupled from code and shared across upgrades.\r\n\r\n#### Why `extra.cp.txt`?\r\nWhen deploying a project with multiple local modules, some JARs might not be available in a shared Maven repository yet. We maintain `extra.cp.txt` in the project folder to define these \"extra\" classpath entries. The Maven plugin then merges them with the resolved remote dependencies when generating the final `cp.txt`.\r\n\r\n > [!NOTE] **java will ignore non-existing classpath entries**, so you can add both your jar and classes folder to classpath, then you can switch them when testing code on remote server, just make sure both are not available at the same time. It is faster to sync just classes than wait for jar to be built, if you for some reason need to iterate on something that is easier to do on a remote server than locally (some resources may be hard to get to in local env).\r\n\r\n\r\n## 3. Generating the Classpath (Manual)\r\nIf you are assembling the folder manually, you can use the `get_deps` tool to generate a stable `cp.txt`.\r\n\r\n```bash\r\n# Example: Generate the classpath for the md-to-odt module\r\n./get_deps deps -i md-to-odt/pom.xml --extra-classpath md-to-odt/extra.cp.txt --classpath > /opt/md-to-odt/v1.0.0/cp.txt\r\n```\r\n\r\n## 4. Automated Staging\r\nInstead of manually assembling the version folder, we use the `stage-deploy` Maven profile in `md-to-odt/pom.xml`.\r\n\r\n```bash\r\n# From examples/multi\r\nmvn clean package -Pstage-deploy -DskipTests\r\n```\r\n\r\nThis profile automates:\r\n1. **Packaging**: Builds `odt-lib` and `md-to-odt`.\r\n2. **Assembly**: Creates `target/v1.0.0/` and copies all local artifacts and `logback.xml`.\r\n3. **Classpath Generation**: Uses the `maven-get-deps-maven-plugin` with the `extra-cp` parameter to resolve remote dependencies and combine them with local JARs into a portable `cp.txt`.\r\n\r\n## 5. Security: Dedicated Service User\r\n\r\nRunning a daemon as `root` is a significant security risk. Always create a dedicated, non-privileged user for your application.\r\n\r\n### Create the Service User\r\nUse `useradd` to create a system user with no login shell and no home directory:\r\n```bash\r\n# Create a system user 'deploy'\r\nsudo useradd --system --shell /usr/sbin/nologin --comment \"Deployment User\" deploy\r\n```\r\n\r\n### Filesystem Permissions\r\nThe `deploy` user needs to read the application files and have write access to the specific folders where it generates output.\r\n\r\n1.  **Application Root**: Make sure the `deploy` user can read everything in `/opt/md-to-odt`.\r\n    ```bash\r\n    sudo chown -R deploy:deploy /opt/md-to-odt\r\n    sudo chmod -R 755 /opt/md-to-odt\r\n    ```\r\n2.  **Shared Cache**: The user needs read access to the shared Maven repository.\r\n    ```bash\r\n    sudo chown -R deploy:deploy /opt/shared/m2\r\n    ```\r\n3.  **Data Directories**: The user *must* have write access to the output folder.\r\n    ```bash\r\n    sudo mkdir -p /srv/md/input /srv/md/output\r\n    sudo chown deploy:deploy /srv/md/input /srv/md/output\r\n    ```\r\n\r\n## 6. The Systemd Service File\r\nThe service points to the `current` symlink. It dynamically loads the classpath on every start, ensuring it always uses the correct dependencies for that specific version.\r\n\r\n### Stay Portable: Service File Symlinking\r\nInstead of creating the service file directly in `/etc/systemd/system/`, keep it inside your deployment directory (e.g., `/opt/md-to-odt/md-to-odt.service`) and symlink it. This makes your deployment directory a **self-contained unit** that can be easily moved or recovered.\r\n\r\n```bash\r\nsudo ln -s /opt/md-to-odt/md-to-odt.service /etc/systemd/system/md-to-odt.service\r\nsudo systemctl daemon-reload\r\n```\r\n\r\n**`/opt/md-to-odt/md-to-odt.service`**:\r\n```ini\r\n[Unit]\r\nDescription=Markdown to ODT Converter Daemon\r\nAfter=network.target\r\n\r\n[Service]\r\nType=simple\r\nUser=deploy\r\nGroup=deploy\r\nWorkingDirectory=/opt/md-to-odt\r\n\r\n# 1. Dynamically generate the full CLASSPATH from the version's cp.txt\r\n#    Note: 'current' is our atomic symlink. We include the app jar itself.\r\nExecStartPre=/bin/sh -c 'echo \"CLASSPATH=current/md-to-odt.jar:$(./get_deps -i current/cp.txt --classpath --cache /opt/shared/m2)\" > /run/md-to-odt.env'\r\n\r\n# 2. Load the environment variable and start the JVM\r\n#    - CLASSPATH: automatically picked up, keeps 'ps' output clean.\r\n#    - LOG_DIR: used by Logback to find where to store/rotate logs.\r\n#    - logback.configurationFile: points to the external config for live scanning.\r\nEnvironmentFile=/run/md-to-odt.env\r\nEnvironment=LOG_DIR=/var/log/md-to-odt\r\n# Note: Java automatically picks up the CLASSPATH variable, keeping 'ps' output clean.\r\nExecStart=/usr/bin/java -Dlogback.configurationFile=logback.xml hr.hrg.md2odt.Main /srv/md/input /srv/md/output\r\n\r\n# Security Hardening (Systemd features)\r\nProtectSystem=full\r\nProtectHome=true\r\nPrivateTmp=true\r\nNoNewPrivileges=true\r\n\r\nRestart=always\r\n\r\n[Install]\r\nWantedBy=multi-user.target\r\n```\r\n\r\n> [!TIP]\r\n> **Log Rotation**: In this example, we use **Logback** with a `RollingFileAppender` inside the application. This is often preferred over `StandardOutput` redirection because:\r\n> 1. **Granularity**: You can have different log files for different components.\r\n> 2. **Native Rotation**: The application handles its own rotation logic (size/time based) and compression (`.gz`).\r\n> 3. **Context**: Logs can include thread names, MDC context, and structured data (JSON) more easily.\r\n> 4. **Live Configuration (`scan=\"true\"`)**: By pointing to an external `logback.xml` via `-Dlogback.configurationFile=logback.xml`, you can change log levels (e.g., from `INFO` to `DEBUG`) by simply editing the file on the server. The application will detect the change and apply it within seconds without needing a restartŌĆöperfect for troubleshooting live issues. This works because the file is on the filesystem and not \"hidden\" inside the JAR.\r\n>\r\n> Ensure the `deploy` user has permission to write to the log directory:\r\n> ```bash\r\n> sudo mkdir -p /var/log/md-to-odt\r\n> sudo chown deploy:deploy /var/log/md-to-odt\r\n> ```\r\n\r\n## 7. Deep Dive: The `/run/*.env` Mechanism\r\n\r\nThe use of an environment file in `/run` is a best-practice for managing dynamic classpaths in `systemd`. HereŌĆÖs how it works in detail:\r\n\r\n### Efficiency and Cleanliness (`CLASSPATH` vs `-cp`)\r\nInstead of passing `-cp` as a command-line argument, we set the `CLASSPATH` environment variable.\r\n- **Clean `ps` output**: Long classpaths (sometimes several kilobytes) make the output of `ps`, `top`, and `htop` unreadable. By using an environment variable, the process list remains concise: `/usr/bin/java hr.hrg.md2odt.Main ...`.\r\n- **Security**: In some environments, command-line arguments might be visible to other users, whereas environment variables are better isolated.\r\n- **JVM Behavior**: When no `-cp` or `-jar` is provided, the JVM automatically uses the `CLASSPATH` environment variable.\r\n\r\n### Why `/run`?\r\nIn modern Linux distributions, `/run` is a **`tmpfs`** (a virtual filesystem in RAM). \r\n- **Performance**: Reading and writing is extremely fast.\r\n- **Volatility**: It is automatically cleared on reboot. This ensures that no \"stale\" classpath from a previous system state is ever used.\r\n\r\n### How it is generated (`ExecStartPre`)\r\n`ExecStartPre` runs *before* the main service starts. We use a short shell command to capture the output of `get_deps`:\r\n```ini\r\nExecStartPre=/bin/sh -c 'echo \"CLASSPATH=current/md-to-odt.jar:$(./get_deps -i current/cp.txt --classpath --cache /opt/shared/m2)\" > /run/md-to-odt.env'\r\n```\r\n- The Zig version of `get_deps` resolves the classpath from `current/cp.txt` in milliseconds.\r\n- The shell (`/bin/sh`) performs the command substitution `$(...)`.\r\n- The result is written as a standard `KEY=VALUE` pair into the file.\r\n\r\n### How it is loaded (`EnvironmentFile`)\r\n`systemd` reads the file specified in `EnvironmentFile=` and injects the variables into the service's environment.\r\n- This allows us to use the `CLASSPATH` variable without needing it in the `ExecStart` line at all.\r\n- **Limitation**: `systemd` does *not* support command substitution directly in `ExecStart`. You cannot do `ExecStart=/usr/bin/java -cp $(tool ...)`. The `/run/*.env` pattern is the standard workaround.\r\n\r\n### Why not use a wrapper script?\r\nYou *could* put the `java` command in a `start.sh` script, but that has downsides:\r\n1. **Signal Handling**: If you use a script, `systemd` sends signals (like `SIGTERM`) to the script, not the JVM (unless you use `exec java ...`).\r\n2. **Process Tracking**: `systemd` loses direct visibility into the JVM's status if it's hidden behind a shell wrapper.\r\n3. **Transparency**: Keeping the `java` command in the `.service` file makes it clear exactly how the application is running when you check `systemctl status`.\r\n\r\n## 8. Deployment Workflow\r\nWith this setup, upgrading to a new version is safe and atomic:\r\n\r\n1.  **Prepare**: Use `stage-deploy` (see section 4) to generate a new version folder (e.g., `v1.1.0/`).\r\n2.  **Config**: Ensure `logback.xml` is present in `/opt/md-to-odt/`.\r\n3.  **Upload**: Copy the version folder to `/opt/md-to-odt/v1.1.0/`.\r\n4.  **Index**: Run `./get_deps gen-index --folders /opt/md-to-odt --output versions.json`.\r\n5.  **Deploy**: Run `./get_deps deploy --version v1.1.0`.\r\n\r\nThe `deploy` command updates `manifest.json`, which updates the `current` symlink atomically and triggers the service restart.\r\n\r\n## 9. Running Locally\r\n\r\nThe project is designed to be easily runnable locally for development and testing.\r\n\r\n### Log Directory Resolution\r\nIn `logback.xml`, the log directory is defined as:\r\n```xml\r\n<property name=\"LOG_DIR\" value=\"${LOG_DIR:-logs}\" />\r\n```\r\nThis syntax tells Logback:\r\n1.  **Check for `LOG_DIR`**: Look for an environment variable or a system property named `LOG_DIR`.\r\n2.  **Default to `logs`**: If not found, use a local folder named `logs`.\r\n\r\n### Running with Maven\r\nYou can run the daemon directly from the `md-to-odt` folder:\r\n```bash\r\nmvn exec:java -Dexec.mainClass=\"hr.hrg.md2odt.Main\" -Dexec.args=\"input output\"\r\n```\r\n\r\n### Running with Java CLI\r\nAfter building the project and generating `cp.txt`:\r\n\r\n**Bash (Linux/macOS)**:\r\n```bash\r\nexport CLASSPATH=\"md-to-odt/target/md-to-odt-1.0.0.jar:$(cat md-to-odt/target/cp.txt)\"\r\njava -DLOG_DIR=./my-logs hr.hrg.md2odt.Main input output\r\n```\r\n\r\n**PowerShell (Windows)**:\r\n```powershell\r\n$CP = Get-Content md-to-odt/target/cp.txt\r\n$env:CLASSPATH = \"md-to-odt\\target\\md-to-odt-1.0.0.jar;\" + $CP\r\njava -DLOG_DIR=./my-logs hr.hrg.md2odt.Main input output\r\n```\r\n\r\nIn these examples, `-DLOG_DIR=./my-logs` overrides the default `logs` folder, demonstrating how the same configuration works across local and production environments.\r\n\r\n## 10. Benefits\r\n- **Lean JARs**: No need to build fat JARs with all dependencies embedded.\r\n- **Fast Startup**: `ExecStartPre` generates the classpath instantly without a JVM.\r\n- **Atomic Swaps**: The app always sees a consistent set of dependencies and code.\r\n- **Failure Recovery**: Use `upgrade-failed` if the new version crashes to instantly revert.\r\n\r\n## 11. Service and Upload Access (ACLs)\r\n\r\nWhen running the app as a restricted user, it must have access to the versions folder and library folders. Managing permissions for multiple users (the service user and the upload user) can be complex.\r\n\r\nA clean approach is to use a `deploy` group and Linux ACLs.\r\n\r\n### Create the Group and Add Users\r\n```bash\r\nsudo groupadd deploy\r\nsudo usermod -aG deploy java-app     # The service user\r\nsudo usermod -aG deploy upload-user # The user uploading new versions\r\n```\r\n\r\n### Apply ACLs\r\nACLs ensure that any new file created within the deployment directory is immediately writable by the `deploy` group.\r\n\r\n```bash\r\n# Install ACL tools if not present\r\nsudo apt install acl\r\n\r\n# Apply recursive ACLs (-R) and set default ACLs (-d)\r\nsudo setfacl -R -m g:deploy:rwx,d:g:deploy:rwx /opt/md-to-odt\r\n```\r\n\r\n"},"README.usage-classpath":{"title":"Classpath Generation","content":"# Classpath Generation\r\n\r\n`maven-get-deps` can generate a ready-to-use `CLASSPATH` string from your dependency list or `pom.xml`. This is useful for:\r\n- Starting Java applications from scripts without complex classpath assembly.\r\n- CI/CD pipelines where you want to run tests or tools without a full Maven build.\r\n- Generating a classpath for a Docker entrypoint.\r\n\r\n## Generating a CLASSPATH from a `pom.xml`\r\n\r\nThe Java CLI can resolve your `pom.xml` and immediately output the CLASSPATH:\r\n\r\n```bash\r\n# Outputs a single OS-separated classpath string to stdout\r\njava -jar maven-get-deps-cli.jar --pom pom.xml --classpath\r\n```\r\n\r\n**Example Output (Linux):**\r\n```\r\n/home/user/.m2/repository/org/springframework/spring-core/6.1.0/spring-core-6.1.0.jar:/home/user/.m2/repository/...\r\n```\r\n\r\n## Transitive Resolution from a Dependencies File\r\n\r\nThe Java CLI can also ingest a simple dependencies file (in either colon or path format) and resolve all transient dependencies, effectively expanding a list of starting points into a full classpath.\r\n\r\n```bash\r\n# test-deps.txt\r\n# org.slf4j:slf4j-api:2.1.0-alpha1\r\n# com.google.guava:guava:32.1.3-jre\r\n\r\njava -jar maven-get-deps-cli.jar test-deps.txt --classpath\r\n```\r\n\r\nThe tool will:\r\n1. Parse the starting artifacts from the file.\r\n2. Build a temporary Maven model.\r\n3. Use the Maven resolution engine to fetch all transitive dependencies.\r\n4. Output the full resolved classpath.\r\n\r\n## Generating a CLASSPATH from a `dependencies.txt` file\r\n\r\nThis is the primary deployment pattern. Your app ships with a pre-generated `dependencies.txt` file (in `path` format) and the tool assembles the classpath at startup:\r\n\r\n```bash\r\n# Generate the file during build\r\nmvn hr.hrg:maven-get-deps:get-deps -DoutputFile=dependencies.txt\r\n\r\n# Assemble CLASSPATH at startup (using Zig binary for speed)\r\nCP=$(get_deps -i dependencies.txt -cf path --classpath --cache /opt/shared/lib)\r\nexport CLASSPATH=\"myapp.jar:$CP\"\r\nexec java com.example.Main\r\n```\r\n\r\n## Using `--extra-classpath` for Multi-Module Projects\r\n\r\nIn Maven multi-module projects, your application typically consists of several local JARs (from each module) **plus** external library dependencies. \r\n\r\nUse `--extra-classpath <file>` to append additional entries to the generated CLASSPATH. The entries are read one per line from the specified file.\r\n\r\n**Example:**\r\n```text\r\n# local_modules.txt\r\n/app/core.jar\r\n/app/api.jar\r\n/app/service.jar\r\n```\r\n\r\n```bash\r\n# Resolve external deps and merge in the local module JARs\r\nCP=$(get_deps -i web-module/dependencies.txt -cf path --classpath \\\r\n     --cache /opt/shared/lib \\\r\n     --extra-classpath local_modules.txt)\r\n\r\nexport CLASSPATH=\"$CP\"\r\nexec java com.example.WebMain\r\n```\r\n\r\nThis also works with the Java CLI:\r\n```bash\r\njava -jar maven-get-deps-cli.jar \\\r\n  --input web-module/dependencies.txt \\\r\n  --convert-format path \\\r\n  --classpath \\\r\n  --extra-classpath local_modules.txt\r\n```\r\n\r\n## Dependency Format Conversion\r\n\r\n`maven-get-deps` can convert between the two common dependency list formats:\r\n\r\n| Format   | Example |\r\n|----------|---------|\r\n| **Colon** | `org.springframework:spring-core:6.1.0` |\r\n| **Path**  | `org/springframework/spring-core/6.1.0/spring-core-6.1.0.jar` |\r\n\r\nThe `path` format maps directly to the Maven repository structure, making it ideal for building filesystem paths.\r\n\r\n```bash\r\n# Convert a colon-format list to path format\r\njava -jar maven-get-deps-cli.jar --input deps-colon.txt --convert-format path\r\n\r\n# Convert a path-format list to colon format\r\njava -jar maven-get-deps-cli.jar --input deps-path.txt --convert-format colon\r\n```\r\n\r\n## CLASSPATH in Maven Plugin Mode\r\n\r\n```bash\r\n# Output classpath to stdout\r\nmvn hr.hrg:maven-get-deps:get-deps -Dclasspath=true\r\n\r\n# Save classpath to a file\r\nmvn hr.hrg:maven-get-deps:get-deps -Dclasspath=true -DoutputFile=cp.txt\r\n```\r\n\r\n## Using the High-Performance Zig Binary\r\n\r\nFor ultra-fast classpath generation (e.g., in startup scripts where milliseconds matter), use the Zig binary instead of the Java CLI. It has no JVM warmup overhead.\r\n\r\n```bash\r\n# ~5ms vs ~300ms for the Java CLI\r\nget_deps -i dependencies.txt -cf path --classpath --cache /opt/shared/lib\r\n```\r\n\r\nSee [README.zig.md](README.zig.md) for full details on the Zig binary.\r\n"},"README.usage-cve":{"title":"CVE Vulnerability Scanning","content":"# CVE Vulnerability Scanning\n\nThe `cve12` CLI tool (built with the `cve12` Maven project) includes an embedded OWASP Dependency-Check engine. It scans your dependencies against a local H2 database of NVD CVE records ŌĆö **no network access** is required during the actual scan.\n\n---\n\n## Step 1: Populate / Update the Local CVE Database\n\nThe H2 database is stored at `~/.m2/dependency-check-data` by default.\n\n```bash\n# First-time setup (downloads ~330K+ NVD CVE records, may take several minutes)\njava -jar cve12.jar --update\n\n# Highly recommended: use a free NVD API key for 10x faster downloads\njava -jar cve12.jar --update --key <YOUR_KEY>\n\n# Custom database location\njava -jar cve12.jar --update --data /shared/cve-db\n```\n\n> **Get a free NVD API key** at [nvd.nist.gov/developers/request-an-api-key](https://nvd.nist.gov/developers/request-an-api-key).\n\n### Scheduled Updates\n\nKeep the database current by scheduling `--update` as a recurring task:\n\n```cron\n# Linux/macOS: daily at 03:00\n0 3 * * * java -jar /opt/cve12.jar --update --key $NVD_KEY\n```\n\n```powershell\nschtasks /create /tn \"CVE DB Update\" /tr \"java -jar C:\\tools\\cve12.jar --update\" /sc daily /st 03:00\n```\n\n#### Update Cron Job (Linux / macOS)\n```bash\n# Update every Sunday at 3 AM with an API key and a 5-second delay to be safe\n0 3 * * 0 /path/to/cve12 --update --key YOUR_KEY --nd 5000 --data /var/lib/owasp-data\n```\n\n| Parameter | Short | Description |\n|---|---|---|\n| `--update` | `-u` | Trigger the data download and exit. |\n| `--key` | `-k` | [Optional] API key for higher rate limits. |\n| `--nd` | `-nd` | [Optional] Delay in milliseconds between NVD API requests. |\n| `--data` | `-d` | Path to the directory for the H2 database. |\n\n---\n\n## Step 2: Generate a CVE Report\n\nThe `cve12` tool expects an input file containing a list of dependencies (one per line, in `G:A:V` format).\n\n```bash\n# Generate dependency list first using maven-get-deps\njava -jar maven-get-deps.jar --pom pom.xml --output deps.txt\n\n# Scan from the generated list\njava -jar cve12.jar --input deps.txt --report report.md\n\n# Custom database location\njava -jar cve12.jar --input deps.txt --report report.md --data /shared/cve-db\n```\n\n---\n\n## Report Format\n\nThe output is a two-section markdown file:\n\n**Section 1 ŌĆö Summary table** (one row per direct dependency):\n```\n| Direct Dependency         | Status    | Transitive Issues |\n|---------------------------|:---------:|:-----------------:|\n| org.example:foo:1.0       | Ō£ģ CLEAN  | ŌĆö                 |\n| log4j:log4j:1.2.17        | ŌÜĀ CVE     | 0 with CVEs       |\n```\n\n**Section 2 ŌĆö Details per dependency** (one block per direct dependency with issues):\n```\n| Artifact        | Version | CVEs                                                         | Nearest Clean |\n|-----------------|---------|--------------------------------------------------------------|---------------|\n| log4j:log4j     | 1.2.17  | [CVE-2019-17571](https://nvd.nist.gov/vuln/detail/...) ...  | ŌĆö             |\n```\n\n---\n\n## Build Breaking / Severity Threshold (`--threshold`)\n\nUse this in CI/CD pipelines to fail the build if vulnerabilities above a given severity are found (CVSS score 0.0 ŌĆō 10.0, default: `8.0`).\n\n```bash\n# Exit code 1 if any CVE has score >= 7.5\njava -jar cve12.jar --input deps.txt --report report.md --threshold 7.5\n```\n\nIf no CVEs meet the threshold, the tool exits with **code 0**. Otherwise, it prints a warning and exits with **code 1**, breaking the pipeline.\n\n### Example CI Pipeline Step (GitHub Actions):\n```yaml\n- name: CVE Scan\n  run: |\n    # 1. Get deps\n    java -jar maven-get-deps.jar --pom pom.xml --output target/deps.txt\n    # 2. Scan\n    java -jar cve12.jar \\\n      --input target/deps.txt \\\n      --report target/cve-report.md \\\n      --threshold 7.0 \\\n      --data $HOME/.m2/dependency-check-data\n- name: Upload CVE Report\n  uses: actions/upload-artifact@v4\n  if: always()\n  with:\n    name: cve-report\n    path: target/cve-report.md\n```\n\n---\n\n## Using OWASP Directly (without built-in scan)\n\nRunning the OWASP Dependency-Check plugin directly within your project gives you the most control over the scanning process. This approach is highly efficient when combined with a pre-populated local database, as it skips expensive remote API calls and relies on local H2 data.\n\nIn CI/CD environments, the default `${user.home}/.m2/dependency-check-data` might be inaccessible or non-persistent. You can override the database directory on the command line using the `-DdataDirectory` property:\n\n```bash\nmvn dependency-check:check -DdataDirectory=/opt/shared/cve-db\n```\n\nFor projects using the plugin directly, you can configure it for maximum speed by disabling remote lookup:\n\n```xml\n<configuration>\n    <failBuildOnCVSS>7</failBuildOnCVSS>\n    <suppressionFile>./pom.verify.supress</suppressionFile>\n    <!-- ~/ will not work corss platform, but maven has builting variable for this purpose -->\n    <dataDirectory>${user.home}/.m2/dependency-check-data</dataDirectory>\n\n    <!-- KEEP LOCAL: Stop remote API calls -->\n    <autoUpdate>false</autoUpdate>\n    <ossindexAnalyzerEnabled>false</ossindexAnalyzerEnabled>\n    <centralAnalyzerEnabled>false</centralAnalyzerEnabled>\n    <nexusAnalyzerEnabled>false</nexusAnalyzerEnabled>\n\n    <!-- enable the engines that find dependencies -->\n    <jarAnalyzerEnabled>true</jarAnalyzerEnabled>\n    <archiveAnalyzerEnabled>true</archiveAnalyzerEnabled>\n</configuration>\n```\n\n# TIPS\n\nCheck path that is bringing your dependency into the project\n\n```sh\nmvn dependency:tree -Dverbose -Dincludes=org.apache.commons:commons-lang3\n```\n\n## dependency management\n\nInstead of hunting for exclusions, use dependency management to define forced version (in parent pom if multi-module).\n\n```xml\n<!-- security override due to old version in some deps that we can not move up -->\n<dependencyManagement>\n    <dependencies>\n        <!-- Force the newer commons-lang3 version globally -->\n        <dependency>\n            <groupId>org.apache.commons</groupId>\n            <artifactId>commons-lang3</artifactId>\n            <version>3.18.0</version>\n        </dependency>\n    </dependencies>\n</dependencyManagement>\n```\n"},"README.usage-deploy":{"title":"Deployment Use Case: Lean Releases with a Shared Dependency Library","content":"# Deployment Use Case: Lean Releases with a Shared Dependency Library\r\n\r\nThis page explains the primary design philosophy behind `maven-get-deps` and how to use it to dramatically speed up deployments.\r\n\r\n## Deployment Philosophy\r\n\r\nWhile modern development often defaults to **Docker** and **Fat JARs**, I believe that for many deployments, a shared dependency repository combined with thin application JARs is a more efficient and transparent model.\r\n\r\n### The JVM is already a Container\r\n\r\nThe **Java Virtual Machine (JVM)** is, by definition, a virtual machine. It provides the isolation and portability that many seek in Docker, but with much less overhead:\r\n- **Multi-Version Coexistence**: You can easily install multiple JDK versions on a single host (using tools like [SDKMAN!](https://sdkman.io/)) and run different applications with different versions side-by-side. \r\n- **Fewer Abstraction Layers**: Deploying directly to a host or a simple VM allows for easier inspection. You can use standard OS tools (`top`, `lsof`, `jstack`) without digging through Docker layers, namespaces, or cgroups.\r\n- **Improved Observability**: Logs, heap dumps, and configuration files are directly accessible on the file system, simplifying backup paths and monitoring agents.\r\n- **Resource Efficiency**: You avoid the storage and bandwidth cost of pushing large image layers. A \"Thin JAR\" is often only a few hundred kilobytes, and dependencies are shared across all instances on the host.\r\n\r\n---\r\n\r\n## The Problem\r\n\r\nTo deploy a Java app to a remote server, you need your classes **and** all of your dependencies.\r\nThe usual options are:\r\n\r\n1.  **Fat JAR**: Bundle everything into one giant file. Easy, but wasteful. A simple web app with Spring and Hibernate can have **< 1 MB** of your code dragging **50ŌĆō100 MB** of dependencies. Every deployment re-uploads all 100 MB.\r\n2.  **Flat `lib/` folder**: Copy all JARs to a `lib/` folder next to your app JAR. Better, but still copies shared libraries to each server separately. 10 microservices sharing 90% of the same libs = 10x storage.\r\n\r\n## The Solution: A Shared Dependency Library\r\n\r\n`maven-get-deps` enables a third approach: **a single shared dependency folder** that acts as a local Maven repository.\r\n\r\n```\r\n/opt/shared/lib/                    ŌåÉ shared by all apps on a server or over a network mount\r\n    com/example/my-lib/1.0/...\r\n    org/springframework/...\r\n    org/hibernate/...\r\n\r\n/opt/apps/my-service/\r\n    my-service.jar                  ŌåÉ tiny (your code only, < 1 MB)\r\n    dependencies.txt                ŌåÉ the classpath manifest\r\n    start.sh                        ŌåÉ launch script\r\n```\r\n\r\n### The Deployment Workflow\r\n\r\n**Step 1: Generate `dependencies.txt` during your build**\r\n\r\nUsing the Maven plugin:\r\n```bash\r\nmvn hr.hrg:maven-get-deps:get-deps -DoutputFile=target/dependencies.txt\r\n```\r\n\r\nOr using the CLI:\r\n```bash\r\njava -jar maven-get-deps-cli.jar --pom pom.xml --output target/dependencies.txt\r\n```\r\n\r\n**Step 2: Sync the dependency library to your server**\r\n\r\nThe tool can also **copy** the required JARs into a staging folder for rsync:\r\n```bash\r\njava -jar maven-get-deps-cli.jar --pom pom.xml --dest-dir target/lib-sync --no-copy false\r\nrsync -avz target/lib-sync/ server:/opt/shared/lib/\r\n```\r\n\r\nAlternatively, manage the shared lib folder directly from CI/CD, using it as a growing pool from all deployed app versions.\r\n\r\n**Step 3: Deploy only your thin JAR**\r\n\r\nOn the server, your deployment artifact is just:\r\n- `my-service.jar` (~500 KB)\r\n- `dependencies.txt` (~5 KB)\r\n- `start.sh`\r\n\r\nNo more uploading 100 MB of libraries on every release.\r\n\r\n---\r\n\r\n## Launch Scripts\r\n\r\nThe tool generates the CLASSPATH string at startup from the shared library. This is fast (milliseconds with the Zig binary) and keeps the library organized by Maven artifact coordinates.\r\n\r\n### Bash (`start.sh`):\r\n```sh\r\n#!/bin/sh\r\nLIB_ROOT=\"/opt/shared/lib\"\r\nDEPS_FILE=\"dependencies.txt\"\r\n\r\nCP=$(get_deps -i \"$DEPS_FILE\" -cf path --classpath --cache \"$LIB_ROOT\")\r\n# Or: CP=$(java -jar maven-get-deps-cli.jar --input \"$DEPS_FILE\" --convert-format path --classpath --cache \"$LIB_ROOT\")\r\n\r\nexport CLASSPATH=\"my-service.jar:$CP\"\r\nexec java com.example.Main \"$@\"\r\n```\r\n\r\n> **Note**: Setting `CLASSPATH` before running `java` has a bonus: the huge classpath string disappears from `ps` output on Linux, making process inspection cleaner.\r\n\r\n### PowerShell (`start.ps1`):\r\n```powershell\r\n$LIB_ROOT = \"C:\\opt\\shared\\lib\"\r\n$CP = get_deps -i dependencies.txt -cf path --classpath --cache $LIB_ROOT\r\n\r\n$env:CLASSPATH = \"my-service.jar;\
