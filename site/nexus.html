<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Telekinetic Nexus | Interactive Guide</title>
    <link rel="stylesheet" href="lib/github-dark.min.css">
    <link rel="stylesheet" href="nexus.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
</head>
<body class="dark-theme">
    <div id="app">
        <aside id="sidebar">
            <header class="nexus-header">
                <h1>THE NEXUS</h1>
                <p class="subtitle">Interactive Resolution Guide</p>
            </header>
            
            <nav id="nav-tree">
                <div class="nav-section">
                    <h3>📜 The Technical Tome</h3>
                    <ul id="docs-list"></ul>
                </div>
                <div class="nav-section">
                    <h3>⚔️ Trial Paths</h3>
                    <ul id="adventures-list"></ul>
                </div>
            </nav>

            <footer class="inventory-display">
                <h3>🎒 Traveler's Inventory</h3>
                <div id="inventory-slots" class="slots"></div>
                <div id="seals-display" class="seals"></div>
            </footer>
        </aside>

        <main id="content-area">
            <div id="content-viewer" class="markdown-body">
                <div id="welcome-screen">
                    <h2>Welcome, Traveler</h2>
                    <p>Select a scroll from the sidebar to begin your journey or consult the Tome of Knowledge.</p>
                </div>
            </div>
            
            <div id="stage-actions" class="hidden">
                <button id="complete-stage-btn" class="premium-btn">Mark Trial as Complete</button>
            </div>
        </main>
    </div>

    <!-- Data Bundle (will be inlined by build script) -->
    <script id="nexus-data" type="application/json">{}</script>
    <script src="lib/marked.min.js"></script>
    <script src="lib/highlight.min.js"></script>
    <script src="nexus.js"></script>
</body>
</html>
